---
ard_nodes:
  - name: controller
    hostname: controller
    provider_resource_name: ard-molecule-default-controller
    groups:
      - controller
      - switch
    image: debian-13
    flavor: devstack-control
    preference: devstack
    networks:
      - name: ard-mgmt
        ip: 192.168.96.2
        mac: "52:54:00:96:00:02"
    profiles:
      - ssh
      - nested_virt
      - ovn
  - name: compute1
    hostname: compute1
    provider_resource_name: ard-molecule-default-compute1
    groups:
      - compute
      - peers
      - subnode
    image: debian-13
    flavor: devstack-compute
    preference: devstack
    networks:
      - name: ard-mgmt
        ip: 192.168.96.3
        mac: "52:54:00:96:00:03"
    profiles:
      - ssh
      - nested_virt
      - ovn
