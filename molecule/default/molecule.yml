---
dependency:
  name: galaxy
  enabled: false
driver:
  name: default
provisioner:
  name: ansible
  env:
    ANSIBLE_STDOUT_CALLBACK: community.general.yaml
  ard_render_file: ../../examples/devstack/all-in-one/render.yaml
  ard:
    ard_deployment_name: molecule-default
    ard_provider_resource_prefix: ard-molecule-default
    libvirt:
      network_name: ard-molecule-default
      network_cidr: 192.168.97.0/24
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - converge
    - verify
    - destroy
  create_sequence:
    - dependency
    - create
  destroy_sequence:
    - dependency
    - destroy
