---
dependency:
  name: galaxy
  enabled: false
driver:
  name: default
platforms:
  - name: controller
  - name: compute1
  - name: compute2
provisioner:
  name: ansible
  env:
    ANSIBLE_STDOUT_CALLBACK: yaml
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - converge
    - verify
    - destroy
  create_sequence:
    - dependency
    - create
  destroy_sequence:
    - dependency
    - destroy
