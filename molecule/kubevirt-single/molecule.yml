---
dependency:
  name: galaxy
  enabled: false
driver:
  name: default
provisioner:
  name: ansible
  env:
    ANSIBLE_STDOUT_CALLBACK: community.general.yaml
  ard_render_file: ../../examples/provider-test/single-node/render.yaml
  ard:
    ard_deployment_name: smooney-ardtest
    ard_provider: kubevirt
    ard_provider_profile: kubevirt
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - converge
    - verify
    - destroy
  create_sequence:
    - dependency
    - create
  destroy_sequence:
    - dependency
    - destroy
