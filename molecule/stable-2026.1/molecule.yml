---
dependency:
  name: galaxy
  enabled: false
driver:
  name: default
provisioner:
  name: ansible
  env:
    ANSIBLE_STDOUT_CALLBACK: community.general.yaml
  ard_render_file: ../../examples/devstack/aio-plus-compute/render.yaml
  ard:
    ard_deployment_name: molecule-stable-2026-1
    ard_provider_resource_prefix: ard-molecule-stable-2026-1
    ard_target_branch: stable/2026.1
    libvirt:
      network_name: ard-molecule-stable-2026-1
      network_cidr: 192.168.98.0/24
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - converge
    - verify
    - destroy
  create_sequence:
    - dependency
    - create
  destroy_sequence:
    - dependency
    - destroy
