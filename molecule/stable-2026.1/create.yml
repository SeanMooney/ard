---
- name: Create ARD libvirt deployment
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ard_project_dir: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | default(playbook_dir ~ '/../..', true) }}"
    ard_deployment_dir: "{{ lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') | default(playbook_dir, true) }}/deployment"
    ard_ansible_roles_path: "{{ ard_project_dir }}/ansible/roles:{{ ard_project_dir }}/submodules/zuul-jobs/roles:{{ ard_project_dir }}/submodules/devstack/roles:{{ ard_project_dir }}/submodules/openstack-zuul-jobs/roles"
  tasks:
    - name: Apply ARD provider resources
      ansible.builtin.command:
        argv:
          - ansible-playbook
          - -i
          - localhost,
          - ansible/playbooks/ard-apply.yaml
          - -e
          - ard_deployment_dir={{ ard_deployment_dir }}
      environment:
        ANSIBLE_CONFIG: "{{ ard_project_dir }}/ansible.cfg"
        ANSIBLE_ROLES_PATH: "{{ ard_ansible_roles_path }}"
      args:
        chdir: "{{ ard_project_dir }}"
      changed_when: true

    - name: Wait for ARD provider SSH access
      ansible.builtin.command:
        argv:
          - ansible
          - -i
          - "{{ ard_deployment_dir }}/inventory.yaml"
          - all
          - -m
          - ansible.builtin.wait_for_connection
          - -a
          - timeout=600 sleep=5
      environment:
        ANSIBLE_CONFIG: "{{ ard_project_dir }}/ansible.cfg"
        ANSIBLE_ROLES_PATH: "{{ ard_ansible_roles_path }}"
      args:
        chdir: "{{ ard_project_dir }}"
      changed_when: false
