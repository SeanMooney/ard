---
dependency:
  name: galaxy
  enabled: false
driver:
  name: default
provisioner:
  name: ansible
  env:
    ANSIBLE_STDOUT_CALLBACK: yaml
  ard_render_file: ../../examples/devstack/aio-plus-compute/render.yaml
  ard:
    ard_provider: kubevirt
    ard_provider_profile: kubevirt
    ard_deployment_name: smooney-ardtest-mn
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - converge
    - verify
    - destroy
  create_sequence:
    - dependency
    - create
  destroy_sequence:
    - dependency
    - destroy
