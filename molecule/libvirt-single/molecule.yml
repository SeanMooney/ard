---
dependency:
  name: galaxy
  enabled: false
driver:
  name: default
provisioner:
  name: ansible
  env:
    ANSIBLE_STDOUT_CALLBACK: community.general.yaml
  ard_render_file: ../../examples/provider-test/single-node/render.yaml
  ard:
    ard_deployment_name: molecule-libvirt-single
    ard_provider_resource_prefix: ard-molecule-libvirt-single
    libvirt:
      network_name: ard-molecule-libvirt-single
      network_cidr: 192.168.100.0/24
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - converge
    - verify
    - destroy
  create_sequence:
    - dependency
    - create
  destroy_sequence:
    - dependency
    - destroy
