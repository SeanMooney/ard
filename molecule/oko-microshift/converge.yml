---
- name: Deploy MicroShift into ARD libvirt deployment
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ard_project_dir: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | default(playbook_dir ~ '/../..', true) }}"
    ard_deployment_dir: "{{ lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') | default(playbook_dir, true) }}/deployment"
    ard_ansible_roles_path: "{{ ard_project_dir }}/ansible/roles:{{ ard_project_dir }}/submodules/zuul-jobs/roles:{{ ard_project_dir }}/submodules/devstack/roles:{{ ard_project_dir }}/submodules/openstack-zuul-jobs/roles"
  tasks:
    - name: Run ARD MicroShift deployment playbook
      ansible.builtin.command:
        argv:
          - ansible-playbook
          - -i
          - "{{ ard_deployment_dir }}/inventory.yaml"
          - ansible/playbooks/workloads/microshift/deploy.yaml
          - -e
          - ard_deployment_dir={{ ard_deployment_dir }}
      environment:
        ANSIBLE_CONFIG: "{{ ard_project_dir }}/ansible.cfg"
        ANSIBLE_ROLES_PATH: "{{ ard_ansible_roles_path }}"
      args:
        chdir: "{{ ard_project_dir }}"
      changed_when: true

- name: Deploy OKO skeleton into ARD MicroShift deployment
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ard_project_dir: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') | default(playbook_dir ~ '/../..', true) }}"
    ard_deployment_dir: "{{ lookup('env', 'MOLECULE_SCENARIO_DIRECTORY') | default(playbook_dir, true) }}/deployment"
    ard_ansible_roles_path: "{{ ard_project_dir }}/ansible/roles:{{ ard_project_dir }}/submodules/zuul-jobs/roles:{{ ard_project_dir }}/submodules/devstack/roles:{{ ard_project_dir }}/submodules/openstack-zuul-jobs/roles"
  tasks:
    - name: Run ARD OKO deployment playbook
      ansible.builtin.command:
        argv:
          - ansible-playbook
          - -i
          - "{{ ard_deployment_dir }}/inventory.yaml"
          - ansible/playbooks/workloads/oko/deploy.yaml
          - -e
          - ard_deployment_dir={{ ard_deployment_dir }}
          - -e
          - oko_apply_network_resources=true
          - -e
          - oko_apply_controlplane_resources=true
          - -e
          - oko_apply_dataplane_resources=true
      environment:
        ANSIBLE_CONFIG: "{{ ard_project_dir }}/ansible.cfg"
        ANSIBLE_ROLES_PATH: "{{ ard_ansible_roles_path }}"
      args:
        chdir: "{{ ard_project_dir }}"
      changed_when: true
