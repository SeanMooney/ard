---
dependency:
  name: galaxy
  enabled: false
driver:
  name: default
provisioner:
  name: ansible
  env:
    ANSIBLE_STDOUT_CALLBACK: default
  ard_render_file: ../../examples/oko/microshift-two-edpm-compute/render.yaml
  ard:
    ard_deployment_name: molecule-oko-microshift
    ard_provider_resource_prefix: ard-molecule-oko-microshift
    libvirt:
      network_name: ard-molecule-oko-microshift
      network_cidr: 192.168.102.0/24
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - converge
    - verify
    - destroy
  create_sequence:
    - dependency
    - create
  destroy_sequence:
    - dependency
    - destroy
