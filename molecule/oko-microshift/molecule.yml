---
dependency:
  name: galaxy
  enabled: false
driver:
  name: default
provisioner:
  name: ansible
  env:
    ANSIBLE_STDOUT_CALLBACK: default
  ard:
    provider: libvirt
    provider_profile: local-libvirt
    deployment_name: molecule-oko-microshift
    resource_name_prefix: ard-molecule-oko-microshift
    topology: oko-microshift-two-compute
    render_image: centos-stream-10
    service_profiles: []
    libvirt:
      network_name: ard-molecule-oko-microshift
      network_cidr: 192.168.102.0/24
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - converge
    - verify
    - destroy
  create_sequence:
    - dependency
    - create
  destroy_sequence:
    - dependency
    - destroy
