---
- name: Build proxy environment
  ansible.builtin.set_fact:
    _proxy_env: >-
      {{
        {}
        | combine({'http_proxy': ard_http_proxy, 'HTTP_PROXY': ard_http_proxy} if ard_http_proxy else {})
        | combine({'https_proxy': ard_https_proxy, 'HTTPS_PROXY': ard_https_proxy} if ard_https_proxy else {})
        | combine({'no_proxy': ard_no_proxy, 'NO_PROXY': ard_no_proxy} if ard_no_proxy else {})
      }}

- name: Configure proxy in /etc/environment
  become: true
  ansible.builtin.blockinfile:
    path: /etc/environment
    marker: "# {mark} ARD proxy configuration"
    block: |
      http_proxy="{{ ard_http_proxy }}"
      https_proxy="{{ ard_https_proxy }}"
      HTTP_PROXY="{{ ard_http_proxy }}"
      HTTPS_PROXY="{{ ard_https_proxy }}"
      no_proxy="{{ ard_no_proxy }}"
      NO_PROXY="{{ ard_no_proxy }}"
  when: _proxy_env | length > 0

- name: Configure apt proxy
  become: true
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/90ard-proxy
    mode: "0644"
    content: |
      {% if ard_http_proxy %}Acquire::http::Proxy "{{ ard_http_proxy }}";
      {% endif %}{% if ard_https_proxy %}Acquire::https::Proxy "{{ ard_https_proxy }}";
      {% endif %}
  when:
    - ansible_os_family == 'Debian'
    - (ard_http_proxy | length > 0) or (ard_https_proxy | length > 0)

- name: Configure dnf proxy
  become: true
  ansible.builtin.blockinfile:
    path: /etc/dnf/dnf.conf
    marker: "# {mark} ARD proxy configuration"
    block: |
      proxy={{ ard_https_proxy | default(ard_http_proxy, true) }}
  when:
    - ansible_os_family == 'RedHat'
    - (ard_http_proxy | length > 0) or (ard_https_proxy | length > 0)

- name: Configure pip proxy
  become: true
  community.general.ini_file:
    path: /etc/pip.conf
    section: global
    option: proxy
    value: "{{ ard_https_proxy | default(ard_http_proxy, true) }}"
    create: true
    mode: "0644"
  when: (ard_http_proxy | length > 0) or (ard_https_proxy | length > 0)

- name: Update package cache
  become: true
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  environment: "{{ _proxy_env }}"
  retries: 3
  delay: 10
  register: _apt_update
  until: _apt_update is succeeded
  when: ansible_os_family == 'Debian'

- name: Install ARD base packages
  become: true
  ansible.builtin.package:
    name: "{{ ard_base_packages }}"
    state: present
  environment: "{{ _proxy_env }}"
  retries: 3
  delay: 10
  register: _pkg_install
  until: _pkg_install is succeeded
