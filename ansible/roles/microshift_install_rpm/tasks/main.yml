---
- name: Validate MicroShift networking selection
  ansible.builtin.assert:
    that:
      - microshift_networking in ['ovnk', 'kindnet']
    fail_msg: "microshift_networking must be ovnk or kindnet."

- name: Install MicroShift COPR dependency repositories package first
  become: true
  ansible.builtin.package:
    name: microshift-io-dependencies
    state: present
  when: microshift_rpm_channel in ['copr-stable', 'copr-nightly']

- name: Build MicroShift RPM package list
  ansible.builtin.set_fact:
    microshift_rpm_packages: >-
      {{
        ['microshift']
        + (['microshift-networking'] if microshift_networking == 'ovnk' else ['microshift-kindnet'])
        + (['microshift-topolvm'] if microshift_install_topolvm | bool else [])
        + (['microshift-olm'] if microshift_install_olm | bool else [])
        + microshift_client_packages
      }}

- name: Install MicroShift RPM packages
  become: true
  ansible.builtin.package:
    name: "{{ microshift_rpm_packages }}"
    state: present

- name: Restart CRI-O to apply proxy drop-ins
  become: true
  ansible.builtin.systemd:
    name: crio.service
    state: restarted
    daemon_reload: true
  when: >-
    (ard_http_proxy | default('') | length > 0)
    or (ard_https_proxy | default('') | length > 0)

- name: Prepare TopoLVM backing disk file
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    mkdir -p "$(dirname {{ microshift_topolvm_lvm_disk }})"
    if [ ! -f {{ microshift_topolvm_lvm_disk }} ]; then
      truncate --size={{ microshift_topolvm_lvm_size }} {{ microshift_topolvm_lvm_disk }}
    fi
  args:
    executable: /bin/bash
    creates: "{{ microshift_topolvm_lvm_disk }}"
  when: microshift_install_topolvm | bool

- name: Ensure MicroShift service drop-in directory exists
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/microshift.service.d
    state: directory
    mode: "0755"
  when: microshift_install_topolvm | bool

- name: Configure TopoLVM backing volume group service hook
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/system/microshift.service.d/99-lvm-config.conf
    mode: "0644"
    content: |
      [Service]
      ExecStartPre=/bin/bash -c 'vgs "{{ microshift_topolvm_vg_name }}" || vgcreate -f -y "{{ microshift_topolvm_vg_name }}" "$(losetup --find --show --nooverlap "{{ microshift_topolvm_lvm_disk }}")"'
  when: microshift_install_topolvm | bool

- name: Run MicroShift release postinstall script
  become: true
  ansible.builtin.command:
    argv:
      - "{{ microshift_release_scripts_dir }}/postinstall.sh"
  changed_when: true
  when: microshift_rpm_channel == 'github-release'

- name: Ensure MicroShift config directory exists
  become: true
  ansible.builtin.file:
    path: /etc/microshift
    state: directory
    mode: "0755"

- name: Configure MicroShift API advertise address
  become: true
  ansible.builtin.copy:
    dest: /etc/microshift/config.yaml
    mode: "0644"
    content: |
      apiServer:
        advertiseAddress: {{ microshift_api_advertise_address }}
        subjectAltNames:
          - {{ microshift_hostname_override }}
      node:
        hostnameOverride: {{ microshift_hostname_override }}
        nodeIP: {{ microshift_node_ip }}
  register: microshift_config_file

- name: Gather non-loopback interface MTUs for MicroShift OVN
  ansible.builtin.shell: |
    set -o pipefail
    ip -o link show | awk '$2 != "lo:" { for (i = 1; i <= NF; i++) if ($i == "mtu") print $(i + 1) }'
  args:
    executable: /bin/bash
  register: microshift_iface_mtu_result
  changed_when: false
  when: microshift_networking == 'ovnk'

- name: Compute MicroShift OVN MTU
  ansible.builtin.set_fact:
    microshift_ovn_mtu_effective: >-
      {{ microshift_ovn_mtu if (microshift_ovn_mtu | string | length > 0) else
         ((microshift_iface_mtu_result.stdout_lines | map('int') | list | min) - (microshift_ovn_mtu_headroom | int)) }}
  when: microshift_networking == 'ovnk'

- name: Configure MicroShift OVN MTU
  become: true
  ansible.builtin.copy:
    dest: /etc/microshift/ovn.yaml
    mode: "0644"
    content: |
      mtu: {{ microshift_ovn_mtu_effective }}
  register: microshift_ovn_config_file
  when: microshift_networking == 'ovnk'

- name: Ensure MicroShift OVS init drop-in directory exists
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/microshift-ovs-init.service.d
    state: directory
    mode: "0755"
  when: microshift_networking == 'ovnk'

- name: Configure br-ex node IP for MicroShift OVN
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/system/microshift-ovs-init.service.d/10-br-ex-node-ip.conf
    mode: "0644"
    content: |
      [Service]
      ExecStartPost=/bin/bash -c 'ip addr add {{ microshift_node_ip }}/32 dev br-ex 2>/dev/null || true; ip link set br-ex up'
  register: microshift_ovs_init_dropin
  when: microshift_networking == 'ovnk'

- name: Enable and start MicroShift service
  become: true
  ansible.builtin.systemd:
    name: microshift.service
    enabled: true
    state: started
    daemon_reload: true

- name: Restart MicroShift when config changes
  become: true
  ansible.builtin.systemd:
    name: microshift.service
    state: restarted
    daemon_reload: true
  when: >-
    microshift_config_file.changed
    or (microshift_ovn_config_file.changed | default(false))
    or (microshift_ovs_init_dropin.changed | default(false))

- name: Wait for MicroShift kubeconfig
  become: true
  ansible.builtin.wait_for:
    path: "{{ microshift_kubeconfig }}"
    timeout: "{{ microshift_validate_timeout }}"

- name: Ensure root kubeconfig directory exists
  become: true
  ansible.builtin.file:
    path: /root/.kube
    state: directory
    mode: "0700"

- name: Create root kubeconfig symlink
  become: true
  ansible.builtin.file:
    src: "{{ microshift_kubeconfig }}"
    dest: /root/.kube/config
    state: link
    force: true

- name: "Get home directory for user {{ microshift_user }}"
  ansible.builtin.getent:
    database: passwd
    key: "{{ microshift_user }}"
  register: _user_info

- name: "Get {{ microshift_user }} HOME dir"
  ansible.builtin.set_fact:
    microshift_user_homedir: "{{ getent_passwd[microshift_user][4] }}"

- name: Ensure workload user kubeconfig directory exists
  become: true
  ansible.builtin.file:
    path: "{{ microshift_user_homedir }}/.kube"
    state: directory
    owner: "{{ microshift_user }}"
    group: "{{ microshift_user }}"
    mode: "0700"

- name: Copy kubeconfig for workload user
  become: true
  ansible.builtin.copy:
    src: "{{ microshift_kubeconfig }}"
    dest: "{{ microshift_user_homedir }}/.kube/config"
    owner: "{{ microshift_user }}"
    group: "{{ microshift_user }}"
    mode: "0600"
    remote_src: true

- name: Wait for MicroShift node readiness
  become: true
  ansible.builtin.command:
    argv:
      - kubectl
      - --kubeconfig
      - "{{ microshift_kubeconfig }}"
      - wait
      - "node/{{ microshift_hostname_override }}"
      - --for=condition=Ready
      - "--timeout={{ microshift_validate_timeout }}s"
  changed_when: false
