---
role_name_check: 2
dependency:
  name: galaxy
  enabled: false
driver:
  name: podman
platforms:
  - name: prepare-dev-tools-default
    image: docker.io/library/debian:13
    dockerfile: Dockerfile.j2
    pre_build_image: false
    pull: true
    command: sleep infinity
    tty: true
provisioner:
  name: ansible
  env:
    ANSIBLE_REMOTE_TMP: /tmp/.ansible/tmp
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - converge
    - idempotence
    - verify
    - destroy
  create_sequence:
    - dependency
    - create
  destroy_sequence:
    - dependency
    - destroy
