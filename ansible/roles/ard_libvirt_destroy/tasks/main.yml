---
- name: Check for provider state file
  stat:
    path: "{{ ard_deployment_dir }}/provider-state.yaml"
  register: ard_provider_state_stat

- name: Load provider state
  include_vars:
    file: "{{ ard_deployment_dir }}/provider-state.yaml"
    name: ard_state
  when: ard_provider_state_stat.stat.exists

- name: Build destroy domain list from state
  set_fact:
    ard_destroy_domains: "{{ ard_state.domains | default([]) }}"
  when: ard_provider_state_stat.stat.exists

- name: Build destroy domain list from prefix fallback
  shell: "virsh --connect {{ ard_libvirt_uri }} list --all --name | awk '/^ard-{{ ard_deployment_name }}-/ { print }'"
  register: ard_destroy_domain_names
  changed_when: false
  when: not ard_provider_state_stat.stat.exists

- name: Initialize fallback destroy domain list
  set_fact:
    ard_destroy_domains: []
  when: not ard_provider_state_stat.stat.exists

- name: Convert prefix fallback domains to state-like objects
  set_fact:
    ard_destroy_domains: "{{ ard_destroy_domains + [{'name': item}] }}"
  loop: "{{ ard_destroy_domain_names.stdout_lines | default([]) }}"
  when: not ard_provider_state_stat.stat.exists

- name: Destroy libvirt domains
  command: "virsh --connect {{ ard_libvirt_uri }} destroy {{ item.name }}"
  loop: "{{ ard_destroy_domains | default([]) }}"
  register: ard_destroy_domain
  changed_when: ard_destroy_domain.rc == 0
  failed_when: false

- name: Undefine libvirt domains and remove storage references
  command: "virsh --connect {{ ard_libvirt_uri }} undefine {{ item.name }} --nvram --remove-all-storage"
  loop: "{{ ard_destroy_domains | default([]) }}"
  register: ard_undefine_domain
  changed_when: ard_undefine_domain.rc == 0
  failed_when: false

- name: Destroy libvirt network
  command: "virsh --connect {{ ard_libvirt_uri }} net-destroy {{ ard_libvirt_network_name }}"
  register: ard_net_destroy
  changed_when: ard_net_destroy.rc == 0
  failed_when: false

- name: Undefine libvirt network
  command: "virsh --connect {{ ard_libvirt_uri }} net-undefine {{ ard_libvirt_network_name }}"
  register: ard_net_undefine
  changed_when: ard_net_undefine.rc == 0
  failed_when: false

- name: Remove libvirt deployment image directory
  file:
    path: "{{ ard_libvirt_image_dir }}/{{ ard_deployment_name }}"
    state: absent
