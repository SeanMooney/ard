---
- name: Check required libvirt provider commands
  ansible.builtin.shell: "command -v {{ item }}"
  changed_when: false
  loop:
    - virsh
    - qemu-img
    - cloud-localds
    - setfacl
    - ssh-keygen
  register: ard_libvirt_command_checks
  failed_when: ard_libvirt_command_checks.rc != 0

- name: Check libvirt connection
  ansible.builtin.command: "virsh --connect {{ ard_libvirt_uri }} uri"
  changed_when: false

- name: Check libvirt version for firmware auto-selection
  ansible.builtin.command: "virsh --connect {{ ard_libvirt_uri }} version"
  changed_when: false
  register: ard_libvirt_version

- name: Ensure stack SSH key exists
  ansible.builtin.command: ssh-keygen -t ed25519 -N '' -f {{ lookup('env', 'HOME') }}/.ssh/id_ed25519_stack
  args:
    creates: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519_stack"

- name: Read stack public SSH key
  ansible.builtin.slurp:
    src: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519_stack.pub"
  register: ard_stack_public_key_slurp

- name: Set stack public SSH key fact
  ansible.builtin.set_fact:
    ard_stack_public_key: "{{ ard_stack_public_key_slurp.content | b64decode | trim }}"
