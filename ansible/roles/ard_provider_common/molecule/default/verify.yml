---
- name: Verify
  hosts: all
  gather_facts: true
  roles:
    - role: ard_provider_common
  tasks:
    # ------------------------------------------------------------------
    # Core provider defaults
    # ------------------------------------------------------------------
    - name: Verify core provider defaults
      ansible.builtin.assert:
        that:
          - ard_provider == 'libvirt'
          - ard_provider_profile == 'local-libvirt'
          - ard_topology == 'one-controller-one-compute'
        fail_msg: "Core provider defaults have unexpected values"

    # ------------------------------------------------------------------
    # ard_user
    # ------------------------------------------------------------------
    - name: Verify ard_user is defined and non-empty
      ansible.builtin.assert:
        that:
          - ard_user is defined
          - ard_user | length > 0
        fail_msg: >-
          ard_user is undefined or empty — lookup('env', 'USER')
          must resolve on the control node

    # ------------------------------------------------------------------
    # KubeVirt scalar defaults
    # ------------------------------------------------------------------
    - name: Verify KubeVirt scalar defaults
      ansible.builtin.assert:
        that:
          - ard_kubevirt_namespace is defined
          - ard_kubevirt_namespace == ''
          - ard_kubevirt_storage_class is none
          - ard_kubevirt_image_datasource == 'debian-13'
          - ard_kubevirt_root_disk_size == '80Gi'
          - ard_kubevirt_network_mode == 'masquerade'
          - ard_kubevirt_vm_network_cidr == '192.168.121.0/24'
          - ard_kubevirt_ensure_instancetype_resources == false
          - ard_kubevirt_ssh_access == 'loadbalancer'
          - ard_kubevirt_delete_namespace == false
        fail_msg: "One or more KubeVirt scalar defaults have unexpected values"

    # ------------------------------------------------------------------
    # KubeVirt extra_labels — must be an empty mapping
    # ------------------------------------------------------------------
    - name: Verify ard_kubevirt_extra_labels is an empty dict
      ansible.builtin.assert:
        that:
          - ard_kubevirt_extra_labels is defined
          - ard_kubevirt_extra_labels is mapping
          - ard_kubevirt_extra_labels | length == 0
        fail_msg: "ard_kubevirt_extra_labels must be an empty dict by default"

    # ------------------------------------------------------------------
    # KubeVirt SSH key Secret name contains user and suffix
    # ------------------------------------------------------------------
    - name: Verify ard_kubevirt_ssh_key_secret follows naming convention
      ansible.builtin.assert:
        that:
          - ard_kubevirt_ssh_key_secret is defined
          - ard_kubevirt_ssh_key_secret | length > 0
          - ard_kubevirt_ssh_key_secret.endswith('-pub-key')
          - ard_kubevirt_ssh_key_secret.startswith(ard_user)
        fail_msg: >-
          ard_kubevirt_ssh_key_secret must be '<ard_user>-pub-key',
          got: {{ ard_kubevirt_ssh_key_secret }}

    # ------------------------------------------------------------------
    # KubeVirt headless Service name ends with -headless
    # ------------------------------------------------------------------
    - name: Verify ard_kubevirt_headless_service ends with -headless
      ansible.builtin.assert:
        that:
          - ard_kubevirt_headless_service is defined
          - ard_kubevirt_headless_service.endswith('-headless')
        fail_msg: >-
          ard_kubevirt_headless_service must end with '-headless',
          got: {{ ard_kubevirt_headless_service }}

    # ------------------------------------------------------------------
    # KubeVirt controller service ports — list with ssh/22 entry
    # ------------------------------------------------------------------
    - name: Verify ard_kubevirt_controller_service_ports
      ansible.builtin.assert:
        that:
          - ard_kubevirt_controller_service_ports is defined
          - ard_kubevirt_controller_service_ports is iterable
          - ard_kubevirt_controller_service_ports | length == 1
          - ard_kubevirt_controller_service_ports[0].name == 'ssh'
          - ard_kubevirt_controller_service_ports[0].port == 22
          - ard_kubevirt_controller_service_ports[0].targetPort == 22
        fail_msg: >-
          ard_kubevirt_controller_service_ports must have one entry
          for ssh/22 by default

    # ------------------------------------------------------------------
    # ard_images — kubevirt provider entries for all images
    # ------------------------------------------------------------------
    - name: Verify ard_images kubevirt entries exist for each image
      ansible.builtin.assert:
        that:
          - ard_images[item] is defined
          - ard_images[item].provider is defined
          - ard_images[item].provider.kubevirt is defined
          - ard_images[item].provider.kubevirt.source_kind == 'DataSource'
          - ard_images[item].provider.kubevirt.name == item
        fail_msg: >-
          ard_images['{{ item }}'].provider.kubevirt is missing or
          has wrong source_kind/name
      loop:
        - debian-13
        - ubuntu-24.04
        - centos-stream-9
        - centos-stream-10
        - fedora-eln
        - almalinux-10
        - rocky-linux-10

    # ------------------------------------------------------------------
    # ard_flavors — kubevirt instancetype mappings
    # ------------------------------------------------------------------
    - name: Verify ard_flavors kubevirt instancetype for control flavors
      ansible.builtin.assert:
        that:
          - ard_flavors[item] is defined
          - ard_flavors[item].provider.kubevirt is defined
          - ard_flavors[item].provider.kubevirt.instancetype == 'devstack-8c16g'
        fail_msg: >-
          ard_flavors['{{ item }}'].provider.kubevirt.instancetype
          must be devstack-8c16g
      loop:
        - devstack-control
        - oko-microshift-node

    - name: Verify ard_flavors kubevirt instancetype for compute flavors
      ansible.builtin.assert:
        that:
          - ard_flavors[item] is defined
          - ard_flavors[item].provider.kubevirt is defined
          - ard_flavors[item].provider.kubevirt.instancetype == 'devstack-8c8g'
        fail_msg: >-
          ard_flavors['{{ item }}'].provider.kubevirt.instancetype
          must be devstack-8c8g
      loop:
        - devstack-compute
        - microshift-node
        - oko-edpm-compute

    # ------------------------------------------------------------------
    # node-types preset — node classes and compatibility node types
    # ------------------------------------------------------------------
    - name: Load node-types preset
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../files/presets/node-types.yaml"
        name: _node_types_preset

    - name: Verify node class catalog exists
      ansible.builtin.assert:
        that:
          - _node_types_preset.ard_render_node_classes is defined
          - _node_types_preset.ard_render_node_classes.keys() | list | sort == ['default', 'extra-small', 'large', 'medium', 'small']
        fail_msg: "Node class catalog is missing or has unexpected class names"

    - name: Verify compatibility node types select classes
      ansible.builtin.assert:
        that:
          - _node_types_preset.ard_render_node_types.controller.class == 'large'
          - _node_types_preset.ard_render_node_types.compute.class == 'default'
          - _node_types_preset.ard_render_node_types.microshift.class == 'medium'
          - _node_types_preset.ard_render_node_types.controller.flavor == 'devstack-control'
          - _node_types_preset.ard_render_node_types.compute.flavor == 'devstack-compute'
          - _node_types_preset.ard_render_node_types.microshift.flavor == 'microshift-node'
        fail_msg: "Compatibility node type class/flavor mapping is unexpected"

    - name: Verify workload role mappings exist
      ansible.builtin.assert:
        that:
          - _node_types_preset.ard_render_workload_roles.devstack.devstack_controller.groups | sort == ['controller', 'switch']
          - _node_types_preset.ard_render_workload_roles.devstack.devstack_compute.groups | sort == ['compute', 'peers', 'subnode']
          - _node_types_preset.ard_render_workload_roles.microshift.microshift_node.groups == ['microshift']
          - _node_types_preset.ard_render_workload_roles.oko.microshift_node.groups == ['microshift']
          - _node_types_preset.ard_render_workload_roles.oko.edpm_compute.groups | sort == ['compute', 'peers', 'subnode']
          - _node_types_preset.ard_render_workload_roles.oko.edpm_compute.image_var == 'ard_edpm_image_effective'
        fail_msg: "Workload role mappings are missing or unexpected"

    # ------------------------------------------------------------------
    # topologies preset — workload-family topology mappings and aliases
    # ------------------------------------------------------------------
    - name: Load topologies preset
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../files/presets/topologies.yaml"
        name: _topologies_preset

    - name: Verify workload-family topology presets and aliases
      ansible.builtin.assert:
        that:
          - _topologies_preset.ard_render_workload_topologies.devstack['aio-plus-compute'].node_pools[0].workload_roles | sort == ['devstack_compute', 'devstack_controller']
          - _topologies_preset.ard_render_workload_topologies.devstack['aio-plus-compute'].node_pools[1].workload_roles == ['devstack_compute']
          - _topologies_preset.ard_render_workload_topologies.oko['microshift-two-edpm-compute'].node_pools[1].workload_roles == ['edpm_compute']
          - _topologies_preset.ard_render_topology_aliases['one-controller-one-compute'].workload == 'devstack'
          - _topologies_preset.ard_render_topology_aliases['one-controller-one-compute'].topology == 'aio-plus-compute'
          - _topologies_preset.ard_render_topology_aliases['oko-microshift-two-compute'].workload == 'oko'
          - _topologies_preset.ard_render_topology_aliases['oko-microshift-two-compute'].topology == 'microshift-two-edpm-compute'
        fail_msg: "Workload topology presets or legacy aliases are unexpected"

    # ------------------------------------------------------------------
    # provider-profiles preset — kubevirt profile structure and node class mappings
    # ------------------------------------------------------------------
    - name: Load provider-profiles preset
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../files/presets/provider-profiles.yaml"
        name: _provider_profiles_preset

    - name: Verify provider node-class flavor mappings
      ansible.builtin.assert:
        that:
          - _provider_profiles_preset.ard_render_provider_profiles['local-libvirt'].provider_node_class_defaults.large.flavor == 'oko-microshift-node'
          - _provider_profiles_preset.ard_render_provider_profiles['local-libvirt'].provider_node_class_defaults.medium.flavor == 'microshift-node'
          - _provider_profiles_preset.ard_render_provider_profiles['local-libvirt'].provider_node_class_defaults.default.flavor == 'devstack-compute'
          - _provider_profiles_preset.ard_render_provider_profiles['local-libvirt'].provider_node_class_defaults.small.flavor == 'oko-edpm-compute'
          - _provider_profiles_preset.ard_render_provider_profiles['local-libvirt'].provider_node_class_defaults['extra-small'].flavor == 'bridge-test'
          - _provider_profiles_preset.ard_render_provider_profiles.kubevirt.provider_node_class_defaults.large.flavor == 'devstack-control'
          - _provider_profiles_preset.ard_render_provider_profiles.kubevirt.provider_node_class_defaults.medium.flavor == 'devstack-control'
          - _provider_profiles_preset.ard_render_provider_profiles.kubevirt.provider_node_class_defaults.default.flavor == 'devstack-compute'
          - _provider_profiles_preset.ard_render_provider_profiles.kubevirt.provider_node_class_defaults.small.flavor == 'devstack-compute'
          - _provider_profiles_preset.ard_render_provider_profiles.kubevirt.provider_node_class_defaults['extra-small'].flavor == 'devstack-compute'
        fail_msg: "Provider node-class flavor mappings are unexpected"

    - name: Verify kubevirt provider profile exists in preset
      ansible.builtin.assert:
        that:
          - _provider_profiles_preset.ard_render_provider_profiles is defined
          - _provider_profiles_preset.ard_render_provider_profiles.kubevirt is defined
        fail_msg: "kubevirt key missing from ard_render_provider_profiles preset"

    - name: Verify kubevirt provider profile structure
      ansible.builtin.assert:
        that:
          - _provider_profiles_preset.ard_render_provider_profiles.kubevirt.provider == 'kubevirt'
          - _provider_profiles_preset.ard_render_provider_profiles.kubevirt.provider_defaults is defined
          - _provider_profiles_preset.ard_render_provider_profiles.kubevirt.provider_defaults.image == 'debian-13'
          - _provider_profiles_preset.ard_render_provider_profiles.kubevirt.provider_defaults.controller_flavor == 'devstack-control'
          - _provider_profiles_preset.ard_render_provider_profiles.kubevirt.provider_defaults.compute_flavor == 'devstack-compute'
          - _provider_profiles_preset.ard_render_provider_profiles.kubevirt.provider_defaults.vm_preference == 'devstack'
        fail_msg: >-
          kubevirt provider profile has wrong provider or
          provider_defaults values
