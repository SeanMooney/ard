---
ard_render_provider_profiles:
  local-libvirt:
    provider: libvirt
    provider_defaults:
      image: debian-13
      controller_flavor: devstack-control
      compute_flavor: devstack-compute
      vm_preference: devstack
    capabilities:
      network_modes:
        - nat
        - isolated
  local-static:
    provider: static
    provider_defaults:
      image: debian-13
      controller_flavor: devstack-control
      compute_flavor: devstack-compute
      vm_preference: devstack
    capabilities: {}
  kubevirt:
    provider: kubevirt
    provider_defaults:
      image: debian-13
      controller_flavor: devstack-control
      compute_flavor: devstack-compute
      vm_preference: devstack
    capabilities:
      networks:
        - ard-mgmt
        - datacenter
