---
ard_provider: libvirt
ard_provider_profile: local-libvirt
ard_topology: one-controller-one-compute

# Static provider inputs
ard_static_inventory: ""
ard_static_nodes: []
ard_static_workload_groups: {}
ard_static_become: false
ard_static_validate_ssh: true
ard_static_default_user: stack
ard_static_default_port: 22
ard_static_default_private_key_file: "{{ lookup('env', 'HOME') + '/.ssh/id_ed25519_stack' }}"

ard_target_branch: master
ard_devstack_branch: "{{ ard_target_branch | default('master') }}"
ard_devstack_image: ""
ard_microshift_image: ""
ard_edpm_image: ""
ard_render_image: ""
ard_service_profiles:
  - devstack
  - ovn
  - tempest
ard_render_generated_header: |
  # Generated by ard-render. Do not edit directly.
  # Put local customizations in render.yaml or overrides/render.yaml.

ard_default_image: debian-13
ard_default_controller_flavor: devstack-control
ard_default_compute_flavor: devstack-compute
ard_default_vm_preference: devstack
ard_management_network: ard-mgmt

# Upstream zuul-jobs multi-node-bridge compatible defaults. Provider inventory
# renderers use these to precompute nodepool.bridge_ipv4 before the bridge role
# runs.
bridge_name: br-infra
bridge_address_prefix: "172.24.4"
bridge_address_offset: 1
bridge_address_subnet: 23
bridge_mtu: null
bridge_mtu_headroom: 100

ard_image_cache_dir: "{{ lookup('env', 'XDG_CACHE_HOME') | default(lookup('env', 'HOME') + '/.cache', true) }}/ard/images"
ard_image_download: true
ard_image_checksum_required: false

ard_libvirt_uri: qemu:///system
ard_libvirt_pool: ard
ard_libvirt_network_cidr: 192.168.96.0/24
ard_libvirt_network_gateway: "{{ ard_libvirt_network_cidr | regex_replace('\\.0/24$', '.1') }}"
ard_libvirt_network_name: "ard-{{ ard_deployment_name | default('devstack-1') }}"
ard_libvirt_image_dir: "{{ lookup('env', 'XDG_STATE_HOME') | default(lookup('env', 'HOME') + '/.local/state', true) }}/ard/libvirt/images"
ard_libvirt_firmware: efi
ard_libvirt_secure_boot: false

# User identity (for shared-tenancy naming in KubeVirt)
ard_user: "{{ lookup('env', 'USER') }}"
ard_kubevirt_user_prefix_enabled: true

# KubeVirt provider settings
ard_kubevirt_namespace: ""
ard_kubevirt_storage_class: null
ard_kubevirt_image_datasource: debian-13
ard_kubevirt_root_disk_size: 80Gi
ard_kubevirt_network_mode: masquerade
ard_kubevirt_vm_network_cidr: "192.168.121.0/24"
ard_kubevirt_ensure_instancetype_resources: false
ard_kubevirt_extra_labels: {}
ard_kubevirt_ssh_key_secret: "{{ ard_user }}-pub-key"
ard_kubevirt_ssh_access: loadbalancer
ard_kubevirt_headless_service: "{{ ard_provider_resource_prefix | default(ard_deployment_name | default(''), true) }}-headless"
ard_kubevirt_datacenter_network: true
ard_kubevirt_datacenter_network_name: "{{ ard_provider_resource_prefix | default(ard_deployment_name | default(''), true) }}-net-datacenter"
ard_kubevirt_datacenter_cidr: "10.0.100.0/24"
ard_kubevirt_delete_namespace: false
ard_kubevirt_ssh_private_key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519_stack"
ard_kubevirt_controller_service_ports:
  - name: ssh
    port: 22
    targetPort: 22

# Destroy preserves generated runtime state by default for post-failure
# inspection. Set ard_destroy_cleanup_generated=true to remove generated
# inventory/provider-state/rendered artifacts after provider resources are gone.
ard_destroy_cleanup_generated: false
ard_destroy_cleanup_logs: false

# Apply should not finish until provider-created nodes are usable by Ansible.
ard_apply_wait_timeout: 900

ard_images:
  debian-13:
    os_family: debian
    version: "13"
    cloud_init: true
    provider:
      kubevirt:
        source_kind: DataSource
        name: debian-13
      libvirt:
        url: https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2
        alternate_urls:
          - https://cloud.debian.org/images/cloud/trixie/latest/debian-13-nocloud-amd64.qcow2
        name: debian-13
        cache_filename: debian-13-genericcloud-amd64.qcow2
        format: qcow2
        cloud_init_datasource: NoCloud
  ubuntu-24.04:
    os_family: ubuntu
    version: "24.04"
    cloud_init: true
    provider:
      kubevirt:
        source_kind: DataSource
        name: ubuntu-24.04
      libvirt:
        url: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
        name: ubuntu-24.04
        cache_filename: noble-server-cloudimg-amd64.img
        format: qcow2
        cloud_init_datasource: NoCloud
  centos-stream-9:
    os_family: redhat
    version: "9-stream"
    cloud_init: true
    provider:
      kubevirt:
        source_kind: DataSource
        name: centos-stream9
        namespace: openshift-virtualization-os-images
        preference_kind: VirtualMachineClusterPreference
        preference: centos.stream9
      libvirt:
        url: https://cloud.centos.org/centos/9-stream/x86_64/images/CentOS-Stream-GenericCloud-9-latest.x86_64.qcow2
        name: centos-stream-9
        cache_filename: CentOS-Stream-GenericCloud-9-latest.x86_64.qcow2
        format: qcow2
        cloud_init_datasource: NoCloud
        firmware: bios
  centos-stream-10:
    os_family: redhat
    version: "10-stream"
    cloud_init: true
    provider:
      kubevirt:
        source_kind: DataSource
        name: centos-stream10
        namespace: openshift-virtualization-os-images
        preference_kind: VirtualMachineClusterPreference
        preference: centos.stream10
      libvirt:
        url: https://cloud.centos.org/centos/10-stream/x86_64/images/CentOS-Stream-GenericCloud-10-latest.x86_64.qcow2
        name: centos-stream-10
        cache_filename: CentOS-Stream-GenericCloud-10-latest.x86_64.qcow2
        format: qcow2
        cloud_init_datasource: NoCloud
        firmware: bios
  fedora-eln:
    os_family: redhat
    version: eln
    cloud_init: true
    provider:
      kubevirt:
        source_kind: DataSource
        name: fedora-eln
      libvirt:
        url: https://kojipkgs.fedoraproject.org/compose/eln/Fedora-eln-20260606.n.0/compose/BaseOS/x86_64/images/Fedora-ELN-Cloud-Base-Generic-11-20260606.n.0.x86_64.qcow2
        name: fedora-eln
        cache_filename: Fedora-ELN-Cloud-Base-Generic-11-20260606.n.0.x86_64.qcow2
        format: qcow2
        cloud_init_datasource: NoCloud
        firmware: bios
  almalinux-10:
    os_family: redhat
    version: "10"
    cloud_init: true
    provider:
      kubevirt:
        source_kind: DataSource
        name: almalinux-10
      libvirt:
        url: https://repo.almalinux.org/almalinux/10/cloud/x86_64/images/AlmaLinux-10-GenericCloud-latest.x86_64.qcow2
        name: almalinux-10
        cache_filename: AlmaLinux-10-GenericCloud-latest.x86_64.qcow2
        format: qcow2
        cloud_init_datasource: NoCloud
        firmware: bios
  rocky-linux-10:
    os_family: redhat
    version: "10"
    cloud_init: true
    provider:
      kubevirt:
        source_kind: DataSource
        name: rocky-linux-10
      libvirt:
        url: https://dl.rockylinux.org/pub/rocky/10/images/x86_64/Rocky-10-GenericCloud-Base.latest.x86_64.qcow2
        name: rocky-linux-10
        cache_filename: Rocky-10-GenericCloud-Base.latest.x86_64.qcow2
        format: qcow2
        cloud_init_datasource: NoCloud
        firmware: bios

ard_flavors:
  devstack-control:
    vcpus: 8
    memory: 16Gi
    root_disk_gb: 80
    nested_virt: true
    provider:
      kubevirt:
        instancetype: devstack-8c16g
      libvirt:
        vcpus: 8
        memory_mb: 16384
        cpu_mode: host-passthrough
  devstack-compute:
    vcpus: 8
    memory: 8Gi
    root_disk_gb: 80
    nested_virt: true
    provider:
      kubevirt:
        instancetype: devstack-8c8g
      libvirt:
        vcpus: 8
        memory_mb: 8192
        cpu_mode: host-passthrough
  microshift-node:
    vcpus: 8
    memory: 8Gi
    root_disk_gb: 80
    nested_virt: true
    provider:
      kubevirt:
        instancetype: devstack-8c8g
      libvirt:
        vcpus: 8
        memory_mb: 8192
        cpu_mode: host-passthrough
  oko-microshift-node:
    vcpus: 12
    memory: 16Gi
    root_disk_gb: 100
    nested_virt: true
    provider:
      kubevirt:
        instancetype: devstack-8c16g
      libvirt:
        vcpus: 12
        memory_mb: 16384
        cpu_mode: host-passthrough
        cpu_sockets: 1
        cpu_threads: 2
        cpu_cache_mode: passthrough
        iothreads: 1
        disk_bus: scsi
        disk_cache: writeback
  oko-edpm-compute:
    vcpus: 4
    memory: 4Gi
    root_disk_gb: 50
    nested_virt: true
    provider:
      kubevirt:
        instancetype: devstack-8c8g
      libvirt:
        vcpus: 4
        memory_mb: 4096
        cpu_mode: host-passthrough
        cpu_sockets: 1
        cpu_threads: 2
        cpu_cache_mode: passthrough
        iothreads: 1
        disk_bus: scsi
        disk_cache: writeback
  bridge-test:
    vcpus: 2
    memory: 1Gi
    root_disk_gb: 10
    nested_virt: false
    provider:
      kubevirt:
        instancetype: devstack-2c1g
      libvirt:
        vcpus: 2
        memory_mb: 1024
        cpu_mode: host-passthrough
