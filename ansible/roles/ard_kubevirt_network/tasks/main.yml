---
- name: Create rendered KubeVirt directory
  ansible.builtin.file:
    path: "{{ ard_deployment_dir }}/rendered/kubevirt"
    state: directory
    mode: "0755"

- name: Render headless Service manifest
  ansible.builtin.template:
    src: headless-service.yaml.j2
    dest: "{{ ard_deployment_dir }}/rendered/kubevirt/headless-service.yaml"
    mode: "0644"

- name: Apply headless Service manifest
  ansible.builtin.command:
    argv:
      - oc
      - apply
      - -f
      - "{{ ard_deployment_dir }}/rendered/kubevirt/headless-service.yaml"
      - -n
      - "{{ ard_kubevirt_namespace }}"
  changed_when: true
  tags: requires_cluster

- name: Render UserDefinedNetwork manifest
  ansible.builtin.template:
    src: userdefinednetwork.yaml.j2
    dest: "{{ ard_deployment_dir }}/rendered/kubevirt/datacenter-network.yaml"
    mode: "0644"
  when: ard_kubevirt_datacenter_network | bool

- name: Apply UserDefinedNetwork manifest
  ansible.builtin.command:
    argv:
      - oc
      - apply
      - -f
      - "{{ ard_deployment_dir }}/rendered/kubevirt/datacenter-network.yaml"
      - -n
      - "{{ ard_kubevirt_namespace }}"
  changed_when: true
  when: ard_kubevirt_datacenter_network | bool
  tags: requires_cluster

- name: Wait for UserDefinedNetwork to be ready
  ansible.builtin.command:
    argv:
      - oc
      - wait
      - "userdefinednetwork/{{ ard_kubevirt_datacenter_network_name }}"
      - -n
      - "{{ ard_kubevirt_namespace }}"
      - --for=condition=NetworkCreated
      - --timeout=60s
  changed_when: false
  when: ard_kubevirt_datacenter_network | bool
  tags: requires_cluster
