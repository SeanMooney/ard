---
- name: Set initial ARD deployment render facts
  ansible.builtin.set_fact:
    ard_deployment_dir: "{{ ard_deployment_dir | default('deployments/devstack-1') }}"
    ard_deployment_name: "{{ ard_deployment_name | default((ard_deployment_dir | default('deployments/devstack-1')) | basename) }}"

- name: Set ARD render input paths
  ansible.builtin.set_fact:
    ard_render_file: "{{ ard_render_file | default(ard_deployment_dir + '/render.yaml') }}"
    ard_render_overlay_file: "{{ ard_render_overlay_file | default(ard_deployment_dir + '/overrides/render.yaml') }}"

- name: Check for ARD render intent file
  ansible.builtin.stat:
    path: "{{ ard_render_file }}"
  register: ard_render_file_stat

- name: Load ARD render intent file
  ansible.builtin.include_vars:
    file: "{{ ard_render_file }}"
  when: ard_render_file_stat.stat.exists

- name: Check for ARD render overlay file
  ansible.builtin.stat:
    path: "{{ ard_render_overlay_file }}"
  register: ard_render_overlay_file_stat

- name: Load ARD render overlay file
  ansible.builtin.include_vars:
    file: "{{ ard_render_overlay_file }}"
  when: ard_render_overlay_file_stat.stat.exists

- name: Reload ARD deployment render facts after intent files
  ansible.builtin.set_fact:
    ard_deployment_dir: "{{ ard_deployment_dir | default('deployments/devstack-1') }}"
    ard_deployment_name: "{{ ard_deployment_name | default((ard_deployment_dir | default('deployments/devstack-1')) | basename) }}"
    ard_provider: "{{ ard_provider | default('libvirt') }}"
    ard_provider_profile: "{{ (ard_provider == 'static' and ard_provider_profile == 'local-libvirt') | ternary('local-static', ard_provider_profile) }}"
    ard_topology: "{{ ard_topology | default('one-controller-one-compute') }}"
    ard_devstack_branch_effective: "{{ ard_devstack_branch | default(ard_target_branch | default('master'), true) }}"

- name: Load ARD render topology presets
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../ard_provider_common/files/presets/topologies.yaml"

- name: Load ARD render branch presets
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../ard_provider_common/files/presets/branches.yaml"

- name: Load ARD render service presets
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../ard_provider_common/files/presets/services.yaml"

- name: Load ARD render node type presets
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../ard_provider_common/files/presets/node-types.yaml"

- name: Load ARD render network presets
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../ard_provider_common/files/presets/networks.yaml"

- name: Load ARD render provider profile presets
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../ard_provider_common/files/presets/provider-profiles.yaml"

- name: Normalize ARD render service profile list
  ansible.builtin.set_fact:
    ard_render_service_profile_list: >-
      {{
        (ard_service_profiles.split(',') | map('trim') | reject('equalto', '') | list)
        if ard_service_profiles is string
        else (ard_service_profiles | default(['devstack', 'ovn', 'tempest']))
      }}

- name: Validate supported ARD render presets
  ansible.builtin.assert:
    that:
      - ard_provider in ['libvirt', 'static', 'kubevirt']
      - ard_topology in ard_render_topologies
      - ard_provider_profile in ard_render_provider_profiles
      - ard_render_service_profile_list | difference(ard_render_services.keys() | list) | length == 0
      - ard_provider == 'kubevirt' or ard_libvirt_network_cidr is match('^([0-9]{1,3}\.){3}0/24$')
    fail_msg: >-
      Unsupported render input. provider={{ ard_provider }},
      provider_profile={{ ard_provider_profile }}, topology={{ ard_topology }},
      services={{ ard_render_service_profile_list }}, cidr={{ ard_libvirt_network_cidr }}.

- name: Compose ARD topology preset
  ansible.builtin.set_fact:
    ard_render_topology_config: >-
      {{ ard_render_topologies[ard_topology] |
         combine((ard_render_overrides | default({})).get('topology', {}), recursive=True) |
         combine(ard_topology_overrides | default({}), recursive=True) }}

- name: Initialize ARD service profile composition
  ansible.builtin.set_fact:
    ard_render_services_config: {}
    ard_render_node_profiles: []

- name: Compose requested ARD service profiles
  ansible.builtin.set_fact:
    ard_render_services_config: >-
      {{ ard_render_services_config | combine(ard_render_services[item], recursive=True, list_merge='append') }}
    ard_render_node_profiles: >-
      {{ (ard_render_node_profiles + (ard_render_services[item].node_profiles | default([]))) | unique }}
  loop: "{{ ard_render_service_profile_list }}"

- name: Compose ARD branch and provider profile presets
  ansible.builtin.set_fact:
    ard_render_branch_config: >-
      {{ {'devstack': {'common': {'devstack_branch': ard_devstack_branch_effective}}} |
         combine(ard_render_branches[ard_devstack_branch_effective] | default({}), recursive=True) }}
    ard_render_provider_profile_config: "{{ ard_render_provider_profiles[ard_provider_profile] }}"

- name: Validate provider profile/provider match
  ansible.builtin.assert:
    that:
      - ard_render_provider_profile_config.provider == ard_provider
    fail_msg: "Provider profile '{{ ard_provider_profile }}' is for {{ ard_render_provider_profile_config.provider }} but selected provider is {{ ard_provider }}."

- name: Compose ARD provider defaults
  ansible.builtin.set_fact:
    ard_render_provider_defaults: >-
      {{ ard_render_provider_profile_config.provider_defaults |
         combine(ard_render_branch_config.provider_defaults | default({}), recursive=True) |
         combine((ard_render_overrides | default({})).get('provider_defaults', {}), recursive=True) }}

- name: Resolve explicit provider prefix input
  ansible.builtin.set_fact:
    ard_provider_resource_prefix_explicit: "{{ ard_provider_resource_prefix | default(ard_resource_name_prefix, true) | default(none, true) }}"
    ard_kubevirt_user_prefix_sanitized: >-
      {{ ard_user | default('') | lower | regex_replace('[^a-z0-9-]', '-') | regex_replace('^-+|-+$', '') }}

- name: Validate KubeVirt user-prefixing inputs
  ansible.builtin.assert:
    that:
      - not (
          ard_provider == 'kubevirt' and
          ard_provider_resource_prefix_explicit is none and
          (ard_kubevirt_user_prefix_enabled | default(true) | bool) and
          (ard_kubevirt_user_prefix_sanitized | length == 0)
        )
    fail_msg: >-
      Cannot auto-prefix KubeVirt resources because ard_user '{{ ard_user | default('') }}' sanitizes to an empty
      value. Set a valid ard_user or provide ard_provider_resource_prefix/ard_resource_name_prefix explicitly.

- name: Resolve ARD provider resource prefix default for kubevirt
  ansible.builtin.set_fact:
    ard_provider_resource_prefix_default: >-
      {{ (ard_kubevirt_user_prefix_enabled | default(true) | bool) |
         ternary(
           (ard_kubevirt_user_prefix_sanitized != '' and (ard_deployment_name | lower).startswith(ard_kubevirt_user_prefix_sanitized ~ '-'))
             | ternary(ard_deployment_name, ard_kubevirt_user_prefix_sanitized ~ '-' ~ ard_deployment_name),
           ard_deployment_name
         ) }}

- name: Derive local network and provider defaults
  ansible.builtin.set_fact:
    ard_render_network_prefix: "{{ ard_libvirt_network_cidr | regex_replace('\\.0/24$', '') }}"
    ard_libvirt_network_gateway: "{{ ard_libvirt_network_gateway | default(ard_libvirt_network_cidr | regex_replace('\\.0/24$', '.1')) }}"
    ard_provider_resource_prefix: >-
      {{ ard_provider_resource_prefix_explicit |
         default((ard_provider in ['libvirt', 'static']) |
           ternary('ard-' ~ ard_deployment_name, ard_provider_resource_prefix_default), true) }}
    ard_libvirt_network_name: "{{ ard_libvirt_network_name | default('ard-' + ard_deployment_name) }}"
    ard_devstack_image_effective: >-
      {{ ard_devstack_image |
         default(ard_render_image |
         default(ard_render_branch_config.devstack.image |
         default(ard_render_provider_defaults.image, true), true), true) }}
    ard_render_controller_flavor: "{{ ard_render_controller_flavor | default(ard_render_provider_defaults.controller_flavor) }}"
    ard_render_compute_flavor: "{{ ard_render_compute_flavor | default(ard_render_provider_defaults.compute_flavor) }}"
    ard_render_vm_preference: "{{ ard_render_vm_preference | default(ard_render_provider_defaults.vm_preference) }}"

- name: Derive local render defaults
  ansible.builtin.set_fact:
    ard_render_default_image: "{{ ard_devstack_image_effective }}"

- name: Normalize ARD provider resource prefix compatibility
  ansible.builtin.set_fact:
    ard_resource_name_prefix: "{{ ard_provider_resource_prefix }}"

- name: Compose ARD render networks
  ansible.builtin.set_fact:
    ard_render_networks_config: >-
      {{ ard_render_networks |
         combine({'ard-mgmt': {'mode': 'nat', 'cidr': ard_libvirt_network_cidr, 'gateway': ard_libvirt_network_gateway}}, recursive=True) |
         combine((ard_render_overrides | default({})).get('networks', {}), recursive=True) }}

- name: Validate ARD render networks
  ansible.builtin.assert:
    that:
      - item.value.mode | default('nat') in ['nat', 'isolated']
      - item.value.mode | default('nat') == 'isolated' or item.value.cidr is defined
    fail_msg: "Network {{ item.key }} must use mode nat or isolated; nat networks require cidr."
  loop: "{{ ard_render_networks_config | dict2items }}"

- name: Normalize rendered ARD nodes
  ansible.builtin.set_fact:
    ard_render_nodes_doc: "{{ lookup('ansible.builtin.template', 'nodes.yaml.j2') | from_yaml }}"

- name: Set normalized ARD node list
  ansible.builtin.set_fact:
    ard_render_nodes: "{{ ard_render_nodes_doc.ard_nodes }}"

- name: Resolve requested ARD network names from rendered nodes
  ansible.builtin.set_fact:
    ard_render_requested_network_names: >-
      {{ ard_render_nodes | map(attribute='networks') | flatten | map(attribute='name') | list | unique }}

- name: Validate requested ARD networks are defined
  ansible.builtin.assert:
    that:
      - ard_render_requested_network_names | difference(ard_render_networks_config.keys() | list) | length == 0
    fail_msg: >-
      Rendered nodes reference network(s) that are not defined in the rendered network map: {{
      (ard_render_requested_network_names | difference(ard_render_networks_config.keys() | list)) | join(', ')
      }}.

- name: Validate requested ARD network modes against provider capabilities
  ansible.builtin.assert:
    that:
      - ard_render_networks_config[item].mode | default('nat') in ard_render_provider_profile_config.capabilities.network_modes
    fail_msg: >-
      Network '{{ item }}' is not supported by provider profile '{{ ard_provider_profile }}'
      (unsupported mode '{{ ard_render_networks_config[item].mode | default('nat') }}').
  loop: "{{ ard_render_requested_network_names }}"
  when: ard_render_provider_profile_config.capabilities.network_modes is defined

- name: Validate requested ARD network names against provider capabilities
  ansible.builtin.assert:
    that:
      - ard_render_requested_network_names | difference(ard_render_provider_profile_config.capabilities.networks) | length == 0
    fail_msg: >-
      Rendered nodes reference network(s) that are not supported by provider profile '{{ ard_provider_profile }}': {{
      (ard_render_requested_network_names | difference(ard_render_provider_profile_config.capabilities.networks)) | join(', ')
      }}.
  when: ard_render_provider_profile_config.capabilities.networks is defined

- name: Validate normalized ARD nodes
  ansible.builtin.assert:
    that:
      - ard_render_nodes | length > 0
      - ard_render_nodes | map(attribute='name') | list | unique | length == ard_render_nodes | length
      - ard_render_nodes | map(attribute='networks') | flatten | selectattr('ip', 'defined') | map(attribute='ip') | list | unique | length == ard_render_nodes | map(attribute='networks') | flatten | selectattr('ip', 'defined') | list | length
      - ard_provider == 'kubevirt' or
        (ard_render_nodes | map(attribute='networks') | flatten | selectattr('mac', 'defined') | map(attribute='mac') | list | unique | length == ard_render_nodes | map(attribute='networks') | flatten | selectattr('mac', 'defined') | list | length)
      - ard_management_network in ard_render_networks_config
      - (ard_render_networks_config[ard_management_network].mode | default('nat')) == 'nat'
    fail_msg: >-
      Rendered topology is invalid. Check for duplicate node names, IPs, MACs,
      or an undefined management network.

- name: Resolve KubeVirt controller node
  ansible.builtin.set_fact:
    _kubevirt_controller_node: "{{ ard_render_nodes | selectattr('groups', 'contains', 'controller') | list | first | default(ard_render_nodes[0]) }}"
  when: ard_provider == 'kubevirt'

- name: Resolve KubeVirt controller provider resource name
  ansible.builtin.set_fact:
    _kubevirt_controller_node_resource_name: >-
      {{ _kubevirt_controller_node.provider_resource_name | default((ard_provider_resource_prefix | default(ard_deployment_name, true)) ~ '-' ~ _kubevirt_controller_node.name) }}
  when: ard_provider == 'kubevirt'

- name: Validate KubeVirt base resource names
  ansible.builtin.assert:
    that:
      - ard_provider_resource_prefix is match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
      - ard_provider_resource_prefix | length <= 63
      - ard_kubevirt_headless_service is match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
      - ard_kubevirt_headless_service | length <= 63
      - ard_kubevirt_ssh_key_secret is match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
      - ard_kubevirt_ssh_key_secret | length <= 63
      - not (ard_kubevirt_datacenter_network | default(false) | bool) or
        (ard_kubevirt_datacenter_network_name is match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$') and
         ard_kubevirt_datacenter_network_name | length <= 63)
      - _kubevirt_controller_node_resource_name is match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
      - _kubevirt_controller_node_resource_name | length <= 63
      - (_kubevirt_controller_node_resource_name ~ '-lb') is match('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
      - (_kubevirt_controller_node_resource_name ~ '-lb') | length <= 63
    fail_msg: >-
      KubeVirt provider resource names must be DNS-1123 labels (^[a-z0-9]([-a-z0-9]*[a-z0-9])?$),
      and <= 63 chars: provider prefix, headless service, SSH key secret, datacenter
      network name when enabled, node resource names, rootdisk names, and controller LB
      service name.
  when: ard_provider == 'kubevirt'

- name: Resolve KubeVirt node provider resource names
  ansible.builtin.set_fact:
    _kubevirt_node_resource_names: "{{ ard_render_nodes | map(attribute='provider_resource_name', default='') | list }}"
  when: ard_provider == 'kubevirt'

- name: Resolve KubeVirt node rootdisk names
  ansible.builtin.set_fact:
    _kubevirt_node_rootdisk_names: "{{ _kubevirt_node_resource_names | map('regex_replace', '$', '-rootdisk') | list }}"
  when: ard_provider == 'kubevirt'

- name: Validate KubeVirt node-derived resource names
  ansible.builtin.assert:
    that:
      - _kubevirt_node_resource_names | list | length == ard_render_nodes | length
      - _kubevirt_node_resource_names | select('match', '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$') | list | length == _kubevirt_node_resource_names | length
      - _kubevirt_node_resource_names | map('length') | max <= 63
      - _kubevirt_node_rootdisk_names | select('match', '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$') | list | length == _kubevirt_node_rootdisk_names | length
      - _kubevirt_node_rootdisk_names | map('length') | max <= 63
    fail_msg: "KubeVirt node provider resource names and rootdisk names must be valid Kubernetes resource names (<= 63 chars)."
  when: ard_provider == 'kubevirt'

- name: Compose rendered DevStack variables
  ansible.builtin.set_fact:
    ard_render_devstack_common: >-
      {{ (ard_render_services_config.devstack.common | default({})) |
         combine(ard_render_branch_config.devstack.common | default({}), recursive=True) |
         combine((ard_render_overrides | default({})).get('devstack', {}).get('common', {}), recursive=True) |
         combine(ard_devstack_common_overrides | default({}), recursive=True) }}
    ard_render_devstack_controller: >-
      {{ {'controller_services_extra': ({'n-cpu': false} if not ard_render_topology_config.controller_runs_compute else {})} |
         combine(ard_render_services_config.devstack.controller | default({}), recursive=True) |
         combine((ard_render_overrides | default({})).get('devstack', {}).get('controller', {}), recursive=True) |
         combine(ard_devstack_controller_overrides | default({}), recursive=True) }}
    ard_render_devstack_compute: >-
      {{ (ard_render_services_config.devstack.compute | default({})) |
         combine((ard_render_overrides | default({})).get('devstack', {}).get('compute', {}), recursive=True) |
         combine(ard_devstack_compute_overrides | default({}), recursive=True) }}

- name: Ensure ARD deployment directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ard_deployment_dir }}"
    - "{{ ard_deployment_dir }}/devstack/group_vars"
    - "{{ ard_deployment_dir }}/devstack/host_vars"
    - "{{ ard_deployment_dir }}/rendered/libvirt"
    - "{{ ard_deployment_dir }}/logs"

- name: Render deployment provider inputs
  ansible.builtin.copy:
    dest: "{{ ard_deployment_dir }}/deployment.yaml"
    mode: "0644"
    content: |
      {{ ard_render_generated_header }}
      ---
      ard_provider: {{ ard_provider }}
      ard_provider_profile: {{ ard_provider_profile }}
      ard_deployment_name: {{ ard_deployment_name }}
      ard_provider_resource_prefix: {{ ard_provider_resource_prefix }}
      ard_resource_name_prefix: {{ ard_resource_name_prefix }}

      ard_devstack_branch: {{ ard_devstack_branch_effective }}
      ard_target_branch: {{ ard_devstack_branch_effective }}
      ard_topology: {{ ard_topology }}
      ard_service_profiles: {{ ard_render_service_profile_list | to_json }}
      ard_devstack_image: {{ ard_render_default_image }}
      ard_render_image: {{ ard_render_default_image }}
      ard_default_image: {{ ard_render_default_image }}
      ard_default_controller_flavor: {{ ard_render_controller_flavor }}
      ard_default_compute_flavor: {{ ard_render_compute_flavor }}
      ard_default_vm_preference: {{ ard_render_vm_preference }}
      ard_static_inventory: {{ ard_static_inventory | default('') | to_json }}
      ard_static_nodes: {{ ard_static_nodes | default([]) | to_json }}
      ard_static_workload_groups: {{ ard_static_workload_groups | default({}) | to_json }}
      ard_static_validate_ssh: {{ ard_static_validate_ssh | default(true) }}

      ard_management_network: {{ ard_management_network }}
      ard_libvirt_network_name: {{ ard_libvirt_network_name }}
      ard_libvirt_network_cidr: {{ ard_libvirt_network_cidr }}
      ard_libvirt_network_gateway: {{ ard_libvirt_network_gateway }}
      ard_kubevirt_namespace: {{ ard_kubevirt_namespace }}
      ard_kubevirt_storage_class: {{ ard_kubevirt_storage_class | to_json }}
      ard_kubevirt_image_datasource: {{ ard_kubevirt_image_datasource }}
      ard_kubevirt_root_disk_size: {{ ard_kubevirt_root_disk_size }}
      ard_kubevirt_network_mode: {{ ard_kubevirt_network_mode }}
      ard_kubevirt_user_prefix_enabled: {{ ard_kubevirt_user_prefix_enabled | bool | lower }}
      ard_kubevirt_vm_network_cidr: {{ ard_kubevirt_vm_network_cidr }}
      ard_kubevirt_datacenter_network: {{ ard_kubevirt_datacenter_network | bool | lower }}
      ard_kubevirt_datacenter_network_name: {{ ard_kubevirt_datacenter_network_name }}
      ard_kubevirt_datacenter_cidr: {{ ard_kubevirt_datacenter_cidr }}
      ard_kubevirt_extra_labels: {{ ard_kubevirt_extra_labels | to_json }}
      ard_kubevirt_ssh_access: {{ ard_kubevirt_ssh_access }}
      ard_kubevirt_ssh_key_secret: {{ ard_kubevirt_ssh_key_secret }}
      ard_kubevirt_ssh_private_key_file: {{ ard_kubevirt_ssh_private_key_file }}
      ard_kubevirt_headless_service: {{ ard_kubevirt_headless_service }}
      ard_kubevirt_controller_service_ports: {{ ard_kubevirt_controller_service_ports | to_json }}
      ard_networks:
      {% for network_name, network in ard_render_networks_config.items() %}
        {{ network_name }}:
          mode: {{ network.mode | default('nat') }}
      {% if (network.mode | default('nat')) == 'nat' %}
          cidr: {{ network.cidr }}
          gateway: {{ network.gateway | default(network.cidr | regex_replace('0/24$', '1')) }}
      {% endif %}
          provider_network: {{ network.provider_network | default(network_name) }}
          mac_prefix: "{{ network.mac_prefix | default('52:54:00') }}"
      {% if network.mac_id is defined %}
          mac_id: {{ network.mac_id }}
      {% endif %}
          provider:
            libvirt:
              name: {{ (network.provider | default({})).get('libvirt', {}).get('name', ard_libvirt_network_name if network_name == ard_management_network else ard_libvirt_network_name + '-' + network_name) }}
      {% endfor %}

- name: Render topology inputs
  ansible.builtin.copy:
    dest: "{{ ard_deployment_dir }}/nodes.yaml"
    mode: "0644"
    content: |
      {{ ard_render_generated_header }}
      ---
      {{ {'ard_nodes': ard_render_nodes} | to_nice_yaml(indent=2, sort_keys=False) }}

- name: Render common DevStack vars
  ansible.builtin.copy:
    dest: "{{ ard_deployment_dir }}/devstack/common.yaml"
    mode: "0644"
    content: |
      {{ ard_render_generated_header }}
      {{ ard_render_devstack_common | to_nice_yaml(indent=2, sort_keys=False) }}

- name: Render controller DevStack vars
  ansible.builtin.copy:
    dest: "{{ ard_deployment_dir }}/devstack/group_vars/controller.yaml"
    mode: "0644"
    content: |
      {{ ard_render_generated_header }}
      {{ ard_render_devstack_controller | to_nice_yaml(indent=2, sort_keys=False) }}

- name: Render compute DevStack vars
  ansible.builtin.copy:
    dest: "{{ ard_deployment_dir }}/devstack/group_vars/compute.yaml"
    mode: "0644"
    content: |
      {{ ard_render_generated_header }}
      {{ ard_render_devstack_compute | to_nice_yaml(indent=2, sort_keys=False) }}

- name: Render static provider workspace artifacts
  ansible.builtin.include_role:
    name: ard_static_inventory
  when: ard_provider == 'static'
