---
- name: Set ARD deployment render facts
  ansible.builtin.set_fact:
    ard_deployment_dir: "{{ ard_deployment_dir | default('deployments/devstack-1') }}"
    ard_deployment_name: "{{ ard_deployment_name | default((ard_deployment_dir | default('deployments/devstack-1')) | basename) }}"
    ard_provider: "{{ ard_provider | default('libvirt') }}"
    ard_topology: "{{ ard_topology | default('one-controller-one-compute') }}"

- name: Validate supported local render inputs
  ansible.builtin.assert:
    that:
      - ard_provider == 'libvirt'
      - ard_topology in ['one-controller-one-compute', 'one-controller-two-compute']
      - ard_libvirt_network_cidr is match('^([0-9]{1,3}\.){3}0/24$')
    fail_msg: >-
      Local render currently supports libvirt and /24 CIDRs only. Requested
      provider={{ ard_provider }}, topology={{ ard_topology }},
      cidr={{ ard_libvirt_network_cidr }}.

- name: Derive local network render facts
  ansible.builtin.set_fact:
    ard_render_network_prefix: "{{ ard_libvirt_network_cidr | regex_replace('\\.0/24$', '') }}"
    ard_libvirt_network_gateway: "{{ ard_libvirt_network_gateway | default(ard_libvirt_network_cidr | regex_replace('\\.0/24$', '.1')) }}"
    ard_resource_name_prefix: "{{ ard_resource_name_prefix | default('ard-' + ard_deployment_name) }}"
    ard_libvirt_network_name: "{{ ard_libvirt_network_name | default('ard-' + ard_deployment_name) }}"

- name: Ensure ARD deployment directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ard_deployment_dir }}"
    - "{{ ard_deployment_dir }}/devstack/group_vars"
    - "{{ ard_deployment_dir }}/devstack/host_vars"
    - "{{ ard_deployment_dir }}/rendered/libvirt"
    - "{{ ard_deployment_dir }}/logs"

- name: Render deployment provider inputs
  ansible.builtin.copy:
    dest: "{{ ard_deployment_dir }}/deployment.yaml"
    force: false
    mode: "0644"
    content: |
      ---
      ard_provider: {{ ard_provider }}
      ard_deployment_name: {{ ard_deployment_name }}
      ard_resource_name_prefix: {{ ard_resource_name_prefix }}

      ard_topology: {{ ard_topology }}
      ard_default_image: {{ ard_default_image }}
      ard_default_controller_flavor: {{ ard_default_controller_flavor }}
      ard_default_compute_flavor: {{ ard_default_compute_flavor }}
      ard_default_vm_preference: {{ ard_default_vm_preference }}

      ard_libvirt_network_name: {{ ard_libvirt_network_name }}
      ard_libvirt_network_cidr: {{ ard_libvirt_network_cidr }}
      ard_libvirt_network_gateway: {{ ard_libvirt_network_gateway }}

- name: Render topology inputs
  ansible.builtin.copy:
    dest: "{{ ard_deployment_dir }}/nodes.yaml"
    force: false
    mode: "0644"
    content: |
      ---
      ard_nodes:
        - name: controller
          hostname: controller
          provider_resource_name: {{ ard_resource_name_prefix }}-controller
          groups:
            - controller
            - switch
          image: {{ ard_default_image }}
          flavor: {{ ard_default_controller_flavor }}
          preference: {{ ard_default_vm_preference }}
          networks:
            - name: ard-mgmt
              ip: {{ ard_render_network_prefix }}.2
              mac: "52:54:00:{{ '%02x' | format((ard_render_network_prefix.split('.')[2] | int) % 256) }}:00:02"
          profiles:
            - ssh
            - nested_virt
            - ovn
      {% if ard_topology in ['one-controller-one-compute', 'one-controller-two-compute'] %}
        - name: compute1
          hostname: compute1
          provider_resource_name: {{ ard_resource_name_prefix }}-compute1
          groups:
            - compute
            - peers
            - subnode
          image: {{ ard_default_image }}
          flavor: {{ ard_default_compute_flavor }}
          preference: {{ ard_default_vm_preference }}
          networks:
            - name: ard-mgmt
              ip: {{ ard_render_network_prefix }}.3
              mac: "52:54:00:{{ '%02x' | format((ard_render_network_prefix.split('.')[2] | int) % 256) }}:00:03"
          profiles:
            - ssh
            - nested_virt
            - ovn
      {% endif %}
      {% if ard_topology == 'one-controller-two-compute' %}
        - name: compute2
          hostname: compute2
          provider_resource_name: {{ ard_resource_name_prefix }}-compute2
          groups:
            - compute
            - peers
            - subnode
          image: {{ ard_default_image }}
          flavor: {{ ard_default_compute_flavor }}
          preference: {{ ard_default_vm_preference }}
          networks:
            - name: ard-mgmt
              ip: {{ ard_render_network_prefix }}.4
              mac: "52:54:00:{{ '%02x' | format((ard_render_network_prefix.split('.')[2] | int) % 256) }}:00:04"
          profiles:
            - ssh
            - nested_virt
            - ovn
      {% endif %}

- name: Render common DevStack vars
  ansible.builtin.copy:
    dest: "{{ ard_deployment_dir }}/devstack/common.yaml"
    force: false
    mode: "0644"
    content: |
      ---
      devstack_branch: master
      run_devstack: true
      enable_ceph: false
      configure_vdpa: false
      external_bridge_mtu: 1450
      devstack_libvirt_type: kvm
      stack_user_password: tester

- name: Render controller DevStack vars
  ansible.builtin.copy:
    dest: "{{ ard_deployment_dir }}/devstack/group_vars/controller.yaml"
    force: false
    mode: "0644"
    content: |
      ---
      controller_localrc_extra: {}
      controller_local_conf_extra: {}
      controller_services_extra:{{ '' if ard_topology == 'one-controller-two-compute' else ' {}' }}
      {% if ard_topology == 'one-controller-two-compute' %}
        n-cpu: false
      {% endif %}

- name: Render compute DevStack vars
  ansible.builtin.copy:
    dest: "{{ ard_deployment_dir }}/devstack/group_vars/compute.yaml"
    force: false
    mode: "0644"
    content: |
      ---
      compute_localrc_extra: {}
      compute_local_conf_extra: {}
      compute_services_extra: {}
