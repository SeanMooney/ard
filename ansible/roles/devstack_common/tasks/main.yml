---
# tasks file for devstack_common
- name: set nodepool facts
  set_fact:
    nodepool: >-
      {{ (nodepool | default({})) | combine({
        'private_ipv4': (nodepool.private_ipv4 | default(ansible_facts.default_ipv4.address)),
        'public_ipv4': (nodepool.public_ipv4 | default(ansible_facts.default_ipv4.address))
      }) }}
    zuul: >-
      {{ (zuul | default({})) | combine({
        'executor': {
          'log_root': (zuul.executor.log_root | default('/tmp/zuul_logs')),
          'work_root': (zuul.executor.work_root | default('/tmp/work_root'))
        }
      }) }}

- name: clean work_root
  delegate_to: localhost
  run_once: yes
  file:
    path: '/tmp/work_root'
    state: absent

- name: create work_root
  delegate_to: localhost
  run_once: yes
  file:
    path: '/tmp/work_root'
    state: directory

- name: manage /etc/hosts and /etc/hostname
  become: yes
  tags: hostname
  block:
    - name: Ensure localhost in /etc/hosts
      lineinfile:
        dest: /etc/hosts
        regexp: "^127.0.0.1.*"
        line: "127.0.0.1 localhost"
        state: present

    - name: Ensure hostname does not point to 127.0.*.* in /etc/hosts
      lineinfile:
        dest: /etc/hosts
        regexp: "^127.0.*\\b.*\\s{{ ansible_hostname }}\\b"
        state: absent

    - name: Remove stale host entries for inventory nodes
      lineinfile:
        dest: /etc/hosts
        regexp: "^.*\\s{{ item }}(\\s|$).*$"
        state: absent
      loop: >-
        {{ (groups['all']
            + (groups['all'] | map('extract', hostvars, 'ansible_hostname') | list))
           | unique | list }}

    - name: get short hostname
      command: "hostname -s"
      register: short_hostname

    - name: update ansible_hostname fact
      set_fact:
        ansible_hostname: "{{short_hostname.stdout}}"

    - name: update /etc/hostname
      shell: "echo {{ansible_hostname}} > /etc/hostname && hostname -F /etc/hostname"

    - name: Remove host entries reintroduced after hostname update
      lineinfile:
        dest: /etc/hosts
        regexp: "^\\S+\\s+.*\\b{{ item | regex_escape }}\\b.*$"
        state: absent
      loop: >-
        {{ (groups['all']
            + (groups['all'] | map('extract', hostvars, 'ansible_hostname') | select('defined') | list)
            + [ansible_hostname, short_hostname.stdout])
           | reject('equalto', '')
           | unique | list }}

    # systemd's myhostname NSS module can synthesize link-local IPv6
    # hostname records, for example fe80::... controller. Erlang/RabbitMQ can
    # resolve that address and time out contacting epmd, so make ARD-managed
    # /etc/hosts authoritative for DevStack deployment hostnames.
    - name: Ensure NSS host lookup does not synthesize link-local hostnames
      lineinfile:
        dest: /etc/nsswitch.conf
        regexp: "^hosts:"
        line: "hosts:          files resolve [!UNAVAIL=return] dns"
        state: present

    - name: Generate /etc/hosts for all of the nodes
      blockinfile:
        dest: /etc/hosts
        marker: "# {mark} ANSIBLE GENERATED HOSTS"
        block: |
          {% set configured_host_endpoint_key = devstack_hosts_nodepool_key | default(devstack_endpoint_nodepool_key | default('auto')) %}
          {% set has_subnodes = (groups['compute'] | default(groups['subnode'] | default([]))) | length > 0 %}
          {% set host_endpoint_key = ('bridge_ipv4' if has_subnodes else 'private_ipv4') if configured_host_endpoint_key == 'auto' else configured_host_endpoint_key %}
          {% for host in groups['all'] %}
          {% set aliases = ([hostvars[host]['ansible_hostname'], host, hostvars[host]['ansible_fqdn'] | default('')] | reject('equalto', '') | unique | list) %}
          {{ hostvars[host]['nodepool'][host_endpoint_key] | default(hostvars[host]['nodepool']['private_ipv4'] | default(hostvars[host]['ansible_facts']['default_ipv4']['address'])) }} {{ aliases | join(' ') }}
          {% endfor %}

    # this can sometime result in dns lookup so we do this after we have populated /etc/hosts
    # in general this should not be required as updating /etc/hostname should work.
    - name: force short_hostname
      ansible.builtin.hostname:
        name: "{{ansible_hostname}}"

- name: disable firewall
  become: yes
  when: disable_firewall | bool
  tags: firewall
  block:
    - name: Set firewall default policy
      ufw:
        state: disabled
        policy: allow
      when: ansible_facts.os_family == 'Debian'
      ignore_errors: yes

    - name: Check if firewalld is installed
      command: rpm -q firewalld
      register: firewalld_check
      changed_when: false
      failed_when: firewalld_check.rc > 1
      when: ansible_facts.os_family == 'RedHat'

    - name: Disable firewalld
      service:
        name: "{{ item }}"
        enabled: false
        state: stopped
      with_items:
        - firewalld
      when:
        - ansible_facts.os_family == 'RedHat'
        - firewalld_check.rc == 0

- name: create repo dir
  become: yes
  ansible.builtin.file:
    path: '{{repo_dir}}'
    state: directory
    mode: '0777'
    owner: stack
    group: stack

- name: clone repos
  become_user: stack
  become: yes
  block:
    - name: download devstack
      ansible.builtin.git:
        repo: '{{devstack_repo_url}}'
        dest: '{{repo_dir}}/devstack'
        version: '{{devstack_branch}}'
        refspec: '{{devstack_refspec | default(omit) }}'

- name: disable host key checking in sshd config
  become: yes
  tags: ssh
  block:
    - name: create ssh_config.d
      file:
        path: '/etc/ssh/ssh_config.d'
        state: directory
    - name: template sshd_config
      template:
        src: "ssh_config"
        dest: "/etc/ssh/ssh_config.d/no-ssh-host-key-checking.conf"

- name: Gather minimum local MTU
  set_fact:
    local_mtu: >
      {% set mtus = [] -%}
      {% for interface in ansible_interfaces -%}
        {% set interface_variable = 'ansible_' + interface -%}
        {% if interface_variable in hostvars[inventory_hostname] -%}
          {% set _ = mtus.append(hostvars[inventory_hostname][interface_variable]['mtu']|int) -%}
        {% endif -%}
      {% endfor -%}
      {{- mtus|min -}}

- name: Calculate external_bridge_mtu
  # 30 bytes is overhead for vxlan (which is greater than GRE
  # allowing us to use either overlay option with this MTU.
  # 40 bytes is overhead for IPv6, which will also support an IPv4 overlay.
  # TODO(andreaf) This should work, but it may have to be reconcilied with
  # the MTU setting used by the multinode setup roles in multinode pre.yaml
  set_fact:
    external_bridge_mtu: "{{ local_mtu | int - 30 - 40 }}"
