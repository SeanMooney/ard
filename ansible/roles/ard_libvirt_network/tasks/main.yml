---
- name: Create rendered libvirt directory
  file:
    path: "{{ ard_deployment_dir }}/rendered/libvirt"
    state: directory
    mode: "0755"

- name: Render libvirt network XML
  copy:
    dest: "{{ ard_deployment_dir }}/rendered/libvirt/network.xml"
    mode: "0644"
    content: |
      <network>
        <name>{{ ard_libvirt_network_name }}</name>
        <forward mode='nat'/>
        <ip address='{{ ard_libvirt_network_gateway }}' netmask='255.255.255.0'>
          <dhcp>
      {% for node in ard_nodes %}
            <host mac='{{ node.networks[0].mac }}' name='{{ node.hostname | default(node.name) }}' ip='{{ node.networks[0].ip }}'/>
      {% endfor %}
          </dhcp>
        </ip>
      </network>

- name: Check whether libvirt network exists
  command: "virsh --connect {{ ard_libvirt_uri }} net-info {{ ard_libvirt_network_name }}"
  register: ard_libvirt_network_info
  changed_when: false
  failed_when: false

- name: Define libvirt network
  command: "virsh --connect {{ ard_libvirt_uri }} net-define {{ ard_deployment_dir }}/rendered/libvirt/network.xml"
  when: ard_libvirt_network_info.rc != 0

- name: Start libvirt network
  command: "virsh --connect {{ ard_libvirt_uri }} net-start {{ ard_libvirt_network_name }}"
  register: ard_libvirt_net_start
  changed_when: ard_libvirt_net_start.rc == 0
  failed_when: ard_libvirt_net_start.rc != 0 and ('already active' not in (ard_libvirt_net_start.stderr | default('')))

- name: Mark libvirt network autostart
  command: "virsh --connect {{ ard_libvirt_uri }} net-autostart {{ ard_libvirt_network_name }}"
  changed_when: false
