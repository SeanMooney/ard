---
- name: Identify controller node
  ansible.builtin.set_fact:
    _controller_node: >-
      {{ ard_nodes | selectattr('groups', 'contains', 'controller') | list | first | default(ard_nodes[0]) }}

- name: Resolve controller provider resource name
  ansible.builtin.set_fact:
    _controller_node_resource_name: >-
      {{ _controller_node.provider_resource_name | default((ard_provider_resource_prefix | default(ard_deployment_name, true)) ~ '-' ~ _controller_node.name) }}

- name: Validate KubeVirt SSH access mode
  ansible.builtin.assert:
    that:
      - ard_kubevirt_ssh_access in ['virtctl', 'loadbalancer']
    fail_msg: >-
      ard_kubevirt_ssh_access must be one of: virtctl, loadbalancer.

- name: Initialize KubeVirt access facts
  ansible.builtin.set_fact:
    _controller_lb_ip: ""

- name: Ensure rendered kubevirt directory exists
  ansible.builtin.file:
    path: "{{ ard_deployment_dir }}/rendered/kubevirt"
    state: directory
    mode: "0755"

- name: Render LoadBalancer Service manifest
  ansible.builtin.template:
    src: lb-service.yaml.j2
    dest: "{{ ard_deployment_dir }}/rendered/kubevirt/{{ _controller_node.name }}-lb-service.yaml"
    mode: "0644"
  when: ard_kubevirt_ssh_access == 'loadbalancer'

- name: Apply LoadBalancer Service
  ansible.builtin.command:
    argv:
      - oc
      - apply
      - -f
      - "{{ ard_deployment_dir }}/rendered/kubevirt/{{ _controller_node.name }}-lb-service.yaml"
      - -n
      - "{{ ard_kubevirt_namespace }}"
  changed_when: true
  when: ard_kubevirt_ssh_access == 'loadbalancer'
  tags: requires_cluster

- name: Wait for LoadBalancer external IP
  ansible.builtin.command:
    argv:
      - oc
      - get
      - "svc/{{ _controller_node_resource_name }}-lb"
      - -n
      - "{{ ard_kubevirt_namespace }}"
      - -o
      - "jsonpath={.status.loadBalancer.ingress[0].ip}"
  register: _lb_ip_result
  until: _lb_ip_result.stdout | length > 0
  retries: "{{ ((ard_apply_wait_timeout | int) / 5) | round(0, 'ceil') | int }}"
  delay: 5
  changed_when: false
  when: ard_kubevirt_ssh_access == 'loadbalancer'
  tags: requires_cluster

- name: Set controller LB IP fact
  ansible.builtin.set_fact:
    _controller_lb_ip: "{{ _lb_ip_result.stdout | default('') }}"
  when: ard_kubevirt_ssh_access == 'loadbalancer'
  tags: requires_cluster

- name: Wait for LoadBalancer Service endpoints
  ansible.builtin.command:
    argv:
      - oc
      - get
      - "endpoints/{{ _controller_node_resource_name }}-lb"
      - -n
      - "{{ ard_kubevirt_namespace }}"
      - -o
      - "jsonpath={.subsets[0].addresses[0].ip}"
  register: _lb_endpoint_result
  until: _lb_endpoint_result.stdout | length > 0
  retries: "{{ ((ard_apply_wait_timeout | int) / 5) | round(0, 'ceil') | int }}"
  delay: 5
  changed_when: false
  when: ard_kubevirt_ssh_access == 'loadbalancer'
  tags: requires_cluster

- name: Wait for SSH TCP on controller LoadBalancer
  ansible.builtin.wait_for:
    host: "{{ _controller_lb_ip }}"
    port: 22
    state: started
    timeout: "{{ ard_apply_wait_timeout | int }}"
    sleep: 5
  when: ard_kubevirt_ssh_access == 'loadbalancer'
  tags: requires_cluster

- name: Discover VMI pod IPs for all nodes
  ansible.builtin.command:
    argv:
      - oc
      - get
      - "vmi/{{ item.provider_resource_name | default((ard_provider_resource_prefix | default(ard_deployment_name, true)) ~ '-' ~ item.name) }}"
      - -n
      - "{{ ard_kubevirt_namespace }}"
      - -o
      - "jsonpath={.status.interfaces[0].ipAddress}"
  loop: "{{ ard_nodes }}"
  loop_control:
    label: "{{ item.name }}"
  register: _vmi_ips
  until: _vmi_ips.stdout | default('') | length > 0
  retries: "{{ ((ard_apply_wait_timeout | int) / 5) | round(0, 'ceil') | int }}"
  delay: 5
  changed_when: false
  tags: requires_cluster

- name: Build node IP map
  ansible.builtin.set_fact:
    _node_ips: >-
      {{ _node_ips | default({}) | combine({item.item.name: item.stdout}) }}
  loop: "{{ _vmi_ips.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  tags: requires_cluster

- name: Build datacenter IP map
  ansible.builtin.set_fact:
    _datacenter_ips: "{{ _datacenter_ips | default({}) | combine({item.name: _dc_ip}) }}"
  vars:
    _dc_prefix: "{{ ard_kubevirt_datacenter_cidr | regex_replace('\\.[0-9]+/.*$', '.') }}"
    _peer_names: "{{ ard_nodes | selectattr('groups', 'contains', 'peers') | map(attribute='name') | list }}"
    _dc_ip: >-
      {{ _dc_prefix }}{{ 1 if (item.name == _controller_node.name or 'switch' in item.groups) else (_peer_names.index(item.name) + 2) }}
  loop: "{{ ard_nodes }}"
  loop_control:
    label: "{{ item.name }}"
  when: ard_kubevirt_datacenter_network | default(false) | bool
  tags: requires_cluster

- name: Write inventory.yaml
  ansible.builtin.template:
    src: inventory.yaml.j2
    dest: "{{ ard_deployment_dir }}/inventory.yaml"
    mode: "0644"
  tags: requires_cluster

- name: Write provider-state.yaml
  ansible.builtin.copy:
    dest: "{{ ard_deployment_dir }}/provider-state.yaml"
    mode: "0644"
    content: |
      ---
      ard_provider: kubevirt
      ard_deployment_name: {{ ard_deployment_name }}
      ard_provider_resource_prefix: {{ ard_provider_resource_prefix | default(ard_deployment_name, true) }}
      ard_kubevirt_namespace: {{ ard_kubevirt_namespace }}
      access_mode: {{ ard_kubevirt_ssh_access }}
      controller_lb_service: {{ (_controller_node_resource_name ~ '-lb') if ard_kubevirt_ssh_access == 'loadbalancer' else '' }}
      headless_service: {{ ard_kubevirt_headless_service }}
      datacenter_network: {{ ard_kubevirt_datacenter_network_name if (ard_kubevirt_datacenter_network | default(false) | bool) else '' }}
      controller_lb_ip: {{ _controller_lb_ip | default('') }}
      nodes:
      {% for node in ard_nodes %}
        - inventory_name: {{ node.name }}
          vm_name: {{ node.provider_resource_name | default((ard_provider_resource_prefix | default(ard_deployment_name, true)) ~ '-' ~ node.name) }}
          pod_ip: {{ _node_ips[node.name] | default('') }}
      {% endfor %}
  tags: requires_cluster

- name: Add nodes to active inventory
  ansible.builtin.add_host:
    name: "{{ item.name }}"
    groups: "{{ ['ard_provider_nodes'] + item.groups }}"
    ansible_host: >-
      {{ (item.provider_resource_name | default((ard_provider_resource_prefix | default(ard_deployment_name, true)) ~ '-' ~ item.name)) if ard_kubevirt_ssh_access == 'virtctl'
         else (_controller_lb_ip if item.name == _controller_node.name else (_node_ips[item.name] | default(''))) }}
    ansible_user: stack
    ansible_private_key_file: "{{ ard_kubevirt_ssh_private_key_file }}"
    ansible_ssh_common_args: >-
      {{ '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ForwardX11=no'
         ~ ' -o ProxyCommand="virtctl port-forward --stdio vm/'
         ~ (item.provider_resource_name | default((ard_provider_resource_prefix | default(ard_deployment_name, true)) ~ '-' ~ item.name))
         ~ '/' ~ ard_kubevirt_namespace ~ ' 22"'
         if ard_kubevirt_ssh_access == 'virtctl'
         else ('-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ForwardX11=no' if item.name == _controller_node.name
               else '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ForwardX11=no'
                    ~ ' -o ProxyCommand="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ForwardX11=no'
                    ~ ' -i ' ~ ard_kubevirt_ssh_private_key_file
                    ~ ' -W %h:%p stack@' ~ _controller_lb_ip ~ '"') }}
    ard_deployment_name: "{{ ard_deployment_name }}"
    ard_provider_resource_name: "{{ item.provider_resource_name | default((ard_provider_resource_prefix | default(ard_deployment_name, true)) ~ '-' ~ item.name) }}"
    nodepool: >-
      {{ {'private_ipv4': _node_ips[item.name] | default(''),
          'public_ipv4': (_node_ips[item.name] | default('')) if ard_kubevirt_ssh_access == 'virtctl' else (_controller_lb_ip if item.name == _controller_node.name else (_node_ips[item.name] | default(''))),
          'public_ipv6': ''
         } | combine({'datacenter_ipv4': _datacenter_ips[item.name]} if _datacenter_ips is defined and item.name in _datacenter_ips else {})
           | combine({'bridge_ipv4': ard_inventory_bridge_ipv4} if ard_inventory_bridge_ipv4 | length > 0 else {})
      }}
    zuul:
      executor:
        log_root: /tmp/zuul_logs
        work_root: /tmp/work_root
  loop: "{{ ard_nodes }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    ard_inventory_peer_names: "{{ ard_nodes | selectattr('groups', 'contains', 'peers') | map(attribute='name') | list }}"
    ard_inventory_bridge_ipv4: >-
      {{ bridge_address_prefix ~ '.' ~ (bridge_address_offset | int) if 'switch' in item.groups else
         bridge_address_prefix ~ '.' ~ (bridge_address_offset | int + 1 + ard_inventory_peer_names.index(item.name)) if 'peers' in item.groups else '' }}
  tags: requires_cluster
