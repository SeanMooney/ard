---
- name: Apply OpenStack control-plane resources
  ansible.builtin.command:
    argv:
      - "{{ oko_kube_client }}"
      - --kubeconfig
      - "{{ oko_kubeconfig }}"
      - apply
      - -k
      - "{{ oko_controlplane_workdir }}"
  register: _oko_apply_controlplane
  changed_when: "'created' in _oko_apply_controlplane.stdout or 'configured' in _oko_apply_controlplane.stdout"
  when: oko_apply_controlplane_resources | bool

