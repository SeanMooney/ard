---
- name: Discover OKO datacenter interface
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    configured={{ oko_datacenter_interface | quote }}
    if [ -n "$configured" ] && [ "$configured" != "auto" ]; then
      echo "$configured"
      exit 0
    fi

    bridge={{ oko_ctlplane_bridge | quote }}
    target={{ nodepool.datacenter_ipv4 | default('') | quote }}
    if [ -n "$target" ]; then
      found=$(ip -j -4 addr show | python3 -c '
    import json, sys
    target = sys.argv[1]
    bridge = sys.argv[2]
    for link in json.load(sys.stdin):
        if link.get("ifname") == bridge:
            continue
        for addr in link.get("addr_info", []):
            if addr.get("family") == "inet" and addr.get("local") == target:
                print(link["ifname"])
                raise SystemExit(0)
    ' "$target" "$bridge")
      if [ -n "$found" ] && [ -e "/sys/class/net/$found/device" ]; then
        echo "$found"
        exit 0
      fi
    fi

    if [ -d "/sys/class/net/$bridge/brif" ]; then
      for path in /sys/class/net/$bridge/brif/*; do
        [ -e "$path" ] || continue
        iface=${path##*/}
        case "$iface" in
          gre*|gretap*|erspan*|genev*|genev_sys_*|veth*|tap*|tun*|dummy*|ovn-*|cni*|flannel*)
            continue
            ;;
        esac
        [ -e "/sys/class/net/$iface/device" ] || continue
        echo "$iface"
        exit 0
      done
    fi

    default_iface=$(ip -o route show default 2>/dev/null | awk '{print $5; exit}')
    for path in /sys/class/net/*; do
      iface=${path##*/}
      case "$iface" in
        lo|$default_iface|ovs-system|br-*|virbr*|docker*|veth*|tap*|tun*|dummy*|ovn-*|genev_sys_*)
          continue
          ;;
      esac
      # Keep this to real guest NICs. MicroShift creates many virtual pod and
      # OVS devices that must not be enslaved into the OKO trunk bridge.
      [ -e "$path/device" ] || continue
      echo "$iface"
      exit 0
    done

    echo "Could not discover OKO datacenter interface" >&2
    exit 1
  args:
    executable: /bin/bash
  register: _oko_datacenter_iface_discovery
  changed_when: false
  when:
    - oko_apply_network_resources | bool
    - oko_manage_ctlplane_bridge_slave | bool

- name: Record OKO datacenter interface
  ansible.builtin.set_fact:
    _oko_datacenter_iface_effective: "{{ _oko_datacenter_iface_discovery.stdout | trim }}"
  when:
    - oko_apply_network_resources | bool
    - oko_manage_ctlplane_bridge_slave | bool

- name: Ensure pre-created OKO ctlplane bridge has MicroShift addresses
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    bridge={{ oko_ctlplane_bridge | quote }}
    prefix={{ oko_ctlplane_cidr.split('/')[1] | quote }}
    addr={{ oko_microshift_ctlplane_ip | quote }}

    if ! ip link show "$bridge" >/dev/null 2>&1; then
      echo "Ctlplane bridge $bridge does not exist; run pre-multinode first" >&2
      exit 1
    fi

    ip link set "$bridge" up
    ip addr replace "$addr/$prefix" dev "$bridge"
    ip route replace {{ oko_ctlplane_cidr }} dev "$bridge" src "$addr"
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - oko_apply_network_resources | bool
    - not (oko_manage_ctlplane_bridge_slave | bool)

- name: Enable bridge netfilter for OKO LoadBalancer traffic
  become: true
  ansible.builtin.copy:
    dest: /etc/modules-load.d/ard-oko-br-netfilter.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      br_netfilter
  when: oko_apply_network_resources | bool

- name: Load bridge netfilter module for OKO LoadBalancer traffic
  become: true
  ansible.builtin.command:
    argv:
      - modprobe
      - br_netfilter
  changed_when: false
  when: oko_apply_network_resources | bool

- name: Persist bridge netfilter sysctls for OKO LoadBalancer traffic
  become: true
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-ard-oko-bridge-netfilter.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables = 1
  when: oko_apply_network_resources | bool

- name: Apply bridge netfilter sysctls for OKO LoadBalancer traffic
  become: true
  ansible.builtin.command:
    argv:
      - sysctl
      - -p
      - /etc/sysctl.d/99-ard-oko-bridge-netfilter.conf
  changed_when: false
  when: oko_apply_network_resources | bool

- name: Ensure OKO ctlplane bridge exists on datacenter network
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    bridge={{ oko_ctlplane_bridge | quote }}
    iface={{ _oko_datacenter_iface_effective | quote }}
    prefix={{ oko_ctlplane_cidr.split('/')[1] | quote }}
    addr={{ oko_microshift_ctlplane_ip | quote }}
    dc_addr={{ nodepool.datacenter_ipv4 | default('') | quote }}
    dc_prefix={{ ard_datacenter_prefix_len | default(24) | quote }}

    if ! ip link show "$iface" >/dev/null 2>&1; then
      echo "Datacenter interface $iface does not exist" >&2
      exit 1
    fi

    if ! nmcli -t -f NAME con show | grep -Fxq "$bridge"; then
      nmcli con add type bridge con-name "$bridge" ifname "$bridge" >/dev/null
    fi
    nmcli con mod "$bridge" \
      bridge.stp no \
      ipv4.method manual \
      ipv4.addresses "$addr/$prefix" \
      ipv4.never-default yes \
      ipv6.method disabled \
      connection.autoconnect yes

    slave_con="${bridge}-${iface}"
    if ! nmcli -t -f NAME con show | grep -Fxq "$slave_con"; then
      nmcli con add type ethernet con-name "$slave_con" ifname "$iface" master "$bridge" >/dev/null
    fi
    nmcli con mod "$slave_con" \
      ipv4.method disabled \
      ipv6.method disabled \
      connection.autoconnect yes

    # Disable any standalone active profile on the datacenter NIC before
    # bringing it up as a bridge port. This handles cloud-init/NetworkManager
    # names such as "Wired connection 1" as well as old ARD iface profiles.
    nmcli -t -f NAME,DEVICE con show --active | awk -F: -v dev="$iface" '$2 == dev {print $1}' | while read -r con; do
      [ -n "$con" ] || continue
      [ "$con" = "$slave_con" ] && continue
      nmcli con mod "$con" \
        connection.autoconnect no \
        ipv4.method disabled \
        ipv4.addresses '' \
        ipv4.never-default yes \
        ipv6.method disabled || true
      nmcli con down "$con" >/dev/null 2>&1 || true
    done

    nmcli con up "$bridge" >/dev/null
    nmcli con up "$slave_con" >/dev/null
    ip link set "$bridge" up
    ip addr replace "$addr/$prefix" dev "$bridge"
    ip route replace {{ oko_ctlplane_cidr }} dev "$bridge" src "$addr"

    # Keep the ARD datacenter transport address on the bridge once the physical
    # NIC is enslaved. KubeVirt/Multus uses that underlay for host-to-host
    # traffic while MicroShift NADs attach to the bridge and bridge VLANs.
    if [ -n "$dc_addr" ]; then
      ip addr del "$dc_addr/$dc_prefix" dev "$iface" >/dev/null 2>&1 || true
      ip addr replace "$dc_addr/$dc_prefix" dev "$bridge"
    fi
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - oko_apply_network_resources | bool
    - oko_manage_ctlplane_bridge_slave | bool

- name: Ensure OKO VLAN NetworkManager connections exist on datacenter network
  become: true
  ansible.builtin.shell: |
    set -e
    if nmcli -t -f NAME con show | grep -Fxq {{ item.name | quote }}; then
      nmcli con up {{ item.name | quote }} >/dev/null
      exit 0
    fi
    nmcli con add type vlan con-name {{ item.name | quote }} ifname {{ item.name | quote }} dev {{ item.parent | quote }} id {{ item.vlan | quote }} ipv4.method disabled ipv6.method disabled >/dev/null
    nmcli con up {{ item.name | quote }} >/dev/null
    echo created
  args:
    executable: /bin/bash
  loop:
    - name: "{{ oko_internalapi_master }}"
      parent: "{{ oko_ctlplane_bridge }}"
      vlan: "{{ oko_internalapi_vlan }}"
    - name: "{{ oko_storage_master }}"
      parent: "{{ oko_ctlplane_bridge }}"
      vlan: "{{ oko_storage_vlan }}"
    - name: "{{ oko_tenant_master }}"
      parent: "{{ oko_ctlplane_bridge }}"
      vlan: "{{ oko_tenant_vlan }}"
  register: _oko_vlan_links
  changed_when: "'created' in (_oko_vlan_links.stdout | default(''))"
  when: oko_apply_network_resources | bool

- name: Apply OKO network resources
  ansible.builtin.command:
    argv:
      - "{{ oko_kube_client }}"
      - --kubeconfig
      - "{{ oko_kubeconfig }}"
      - apply
      - -k
      - "{{ oko_network_workdir }}"
  register: _oko_apply_network
  changed_when: "'created' in _oko_apply_network.stdout or 'configured' in _oko_apply_network.stdout"
  when: oko_apply_network_resources | bool

- name: Discover OpenShift router service address
  ansible.builtin.command:
    argv:
      - "{{ oko_kube_client }}"
      - --kubeconfig
      - "{{ oko_kubeconfig }}"
      - -n
      - openshift-ingress
      - get
      - service/router-default
      - -o
      - "jsonpath={.spec.clusterIP}"
  register: _oko_router_service_ip
  changed_when: false
  when: oko_apply_network_resources | bool

- name: Configure MicroShift host route name resolution
  become: true
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ARD OKO public route hosts"
    block: |
      {% for host in oko_route_hosts %}
      {{ _oko_router_service_ip.stdout }} {{ host }}
      {% endfor %}
  when: oko_apply_network_resources | bool

- name: Configure cluster DNS for OKO public route hosts
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    python3 - <<'PY' | tee /tmp/ard-oko-route-dns.out
    import subprocess
    import yaml

    kubeconfig = {{ oko_kubeconfig | to_json }}
    route_ip = {{ _oko_router_service_ip.stdout | to_json }}
    route_hosts = {{ oko_route_hosts | to_json }}
    hosts_lines = "\n".join(f"        {route_ip} {host}" for host in route_hosts)
    hosts_block = "    hosts {\n" + hosts_lines + "\n        fallthrough\n    }\n"

    raw = subprocess.check_output([
        "{{ oko_kube_client }}", "--kubeconfig", kubeconfig,
        "-n", "openshift-dns", "get", "configmap/dns-default", "-o", "yaml",
    ], text=True)
    cm = yaml.safe_load(raw)
    corefile = cm["data"]["Corefile"]
    start = "      # BEGIN ARD OKO public route hosts\n"
    end = "      # END ARD OKO public route hosts\n"
    managed = start + hosts_block + end
    if start in corefile:
        before, rest = corefile.split(start, 1)
        _, after = rest.split(end, 1)
        new_corefile = before + managed + after
    else:
        for marker in (
            "    kubernetes cluster.local in-addr.arpa ip6.arpa {\n",
            "      kubernetes cluster.local in-addr.arpa ip6.arpa {\n",
        ):
            if marker in corefile:
                new_corefile = corefile.replace(marker, managed + marker, 1)
                break
        else:
            raise SystemExit("could not find kubernetes plugin in CoreDNS Corefile")
    if new_corefile != corefile:
        cm["data"]["Corefile"] = new_corefile
        with open("/tmp/ard-dns-default.yaml", "w") as f:
            yaml.safe_dump(cm, f, sort_keys=False)
        subprocess.check_call([
            "{{ oko_kube_client }}", "--kubeconfig", kubeconfig,
            "apply", "-f", "/tmp/ard-dns-default.yaml",
        ])
        print("ARD_DNS_CHANGED")
    PY
    if grep -q ARD_DNS_CHANGED /tmp/ard-oko-route-dns.out; then
      {{ oko_kube_client }} --kubeconfig {{ oko_kubeconfig }} -n openshift-dns rollout restart daemonset/dns-default
      {{ oko_kube_client }} --kubeconfig {{ oko_kubeconfig }} -n openshift-dns rollout status daemonset/dns-default --timeout=300s
    fi
  args:
    executable: /bin/bash
  register: _oko_cluster_route_dns
  changed_when: "'ARD_DNS_CHANGED' in _oko_cluster_route_dns.stdout"
  when: oko_apply_network_resources | bool
