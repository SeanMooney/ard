---
- name: Run OKO preflight checks
  ansible.builtin.import_tasks: preflight.yml

- name: Configure default Cinder NFS storage
  ansible.builtin.import_tasks: storage-nfs.yml
  when: oko_cinder_backend == 'nfs'

- name: Render OKO manifests locally (deployment dir available)
  # Local rendering stores inspectable artifacts in ard_deployment_dir and
  # syncs them to the MicroShift host. Falls back to remote-only rendering
  # when ard_deployment_dir is not set (e.g. standalone Molecule runs).
  ansible.builtin.include_tasks: render-local.yml
  when: oko_local_manifest_enabled | bool

- name: Render OKO manifests remotely (standalone/Molecule mode)
  ansible.builtin.include_tasks: render.yml
  when: not (oko_local_manifest_enabled | bool)

- name: Apply OKO bootstrap manifests
  ansible.builtin.import_tasks: apply.yml

- name: Apply OpenStack operator manifests
  ansible.builtin.import_tasks: operators-apply.yml
  when: oko_install_operators | bool

- name: Wait for OpenStack operator CRDs
  ansible.builtin.import_tasks: operators-wait.yml
  when:
    - oko_install_operators | bool
    - oko_wait_for_operator_crds | bool

- name: Apply OKO network manifests
  ansible.builtin.import_tasks: network-apply.yml

- name: Apply OKO control-plane manifests
  ansible.builtin.import_tasks: openstack-apply.yml

- name: Wait for OKO control-plane resources before dataplane
  ansible.builtin.import_tasks: controlplane-wait.yml
  when:
    - oko_apply_controlplane_resources | bool
    - (oko_wait_for_openstack | bool) or (oko_apply_dataplane_resources | bool)

- name: Apply RabbitMQ LoadBalancer class workaround
  ansible.builtin.import_tasks: rabbitmq-lb-workaround.yml
  when:
    - oko_apply_controlplane_resources | bool
    - oko_rabbitmq_lb_workaround_enabled | bool
    - (oko_wait_for_openstack | bool) or (oko_apply_dataplane_resources | bool)

- name: Require control-plane readiness gate before dataplane
  ansible.builtin.assert:
    that:
      - oko_apply_controlplane_resources | bool
    fail_msg: Dataplane apply requires control-plane resources to be applied and Ready first.
  when: oko_apply_dataplane_resources | bool

- name: Prepare EDPM hosts for OKO dataplane
  ansible.builtin.import_tasks: dataplane-prep.yml

- name: Apply OKO dataplane manifests
  ansible.builtin.import_tasks: dataplane-apply.yml

- name: Wait for OKO dataplane resources
  ansible.builtin.import_tasks: dataplane-wait.yml
  when:
    - oko_wait_for_openstack | bool
    - oko_apply_dataplane_resources | bool

- name: Run OKO postchecks
  ansible.builtin.import_tasks: postcheck.yml
