---
- name: Check for provider state file
  ansible.builtin.stat:
    path: "{{ ard_deployment_dir }}/provider-state.yaml"
  register: _provider_state_stat

- name: Load provider state
  ansible.builtin.include_vars:
    file: "{{ ard_deployment_dir }}/provider-state.yaml"
    name: _provider_state
  when: _provider_state_stat.stat.exists

- name: Initialize KubeVirt destroy targets from defaults
  ansible.builtin.set_fact:
    _kubevirt_destroy_namespace: "{{ ard_kubevirt_namespace }}"
    _kubevirt_destroy_vm_names: []
    _kubevirt_destroy_rootdisk_names: []
    _kubevirt_destroy_service_names: []
    _kubevirt_destroy_vm_state_complete: false

- name: Build KubeVirt destroy targets from provider state
  ansible.builtin.set_fact:
    _kubevirt_destroy_namespace: "{{ _provider_state.ard_kubevirt_namespace | default(ard_kubevirt_namespace) }}"
    _kubevirt_destroy_vm_names: >-
      {{ _provider_state.nodes | default([], true) | map(attribute='vm_name', default='') | select('truthy') | list }}
    _kubevirt_destroy_rootdisk_names: >-
      {{ _provider_state.nodes | default([], true) | map(attribute='vm_name', default='') | select('truthy') | map('regex_replace', '$', '-rootdisk') | list }}
    _kubevirt_destroy_service_names: >-
      {{ [_provider_state.controller_lb_service | default('')] | select('truthy') | list }}
    _kubevirt_destroy_vm_state_complete: >-
      {{ (_provider_state.nodes | default([], true) | map(attribute='vm_name', default='') | select('truthy') | list | length
           == (_provider_state.nodes | default([], true) | length)
         ) and (_provider_state.nodes | default([], true) | length > 0)
      }}
  when: _provider_state_stat.stat.exists

- name: Delete VirtualMachines by persisted name
  ansible.builtin.command:
    argv:
      - oc
      - delete
      - vm
      - "{{ item }}"
      - -n
      - "{{ _kubevirt_destroy_namespace }}"
      - --ignore-not-found
      - --wait=true
      - --timeout=120s
  loop: "{{ _kubevirt_destroy_vm_names }}"
  register: _delete_vms
  changed_when: "'deleted' in (_delete_vms.stdout | default(''))"
  when: _kubevirt_destroy_vm_names | length > 0
  tags: requires_cluster

- name: Delete DataVolumes by persisted name
  ansible.builtin.command:
    argv:
      - oc
      - delete
      - dv
      - "{{ item }}"
      - -n
      - "{{ _kubevirt_destroy_namespace }}"
      - --ignore-not-found
  loop: "{{ _kubevirt_destroy_rootdisk_names }}"
  register: _delete_dvs
  changed_when: "'deleted' in (_delete_dvs.stdout | default(''))"
  when: _kubevirt_destroy_rootdisk_names | length > 0
  tags: requires_cluster

- name: Delete Services by persisted name
  ansible.builtin.command:
    argv:
      - oc
      - delete
      - svc
      - "{{ item }}"
      - -n
      - "{{ _kubevirt_destroy_namespace }}"
      - --ignore-not-found
  loop: "{{ _kubevirt_destroy_service_names }}"
  register: _delete_svcs
  changed_when: "'deleted' in (_delete_svcs.stdout | default(''))"
  when: _kubevirt_destroy_service_names | length > 0
  tags: requires_cluster

- name: Delete VirtualMachines by label selector
  ansible.builtin.command:
    argv:
      - oc
      - delete
      - vm
      - -l
      - "ard.teim.app/deployment={{ ard_deployment_name }}"
      - -n
      - "{{ _kubevirt_destroy_namespace }}"
      - --ignore-not-found
      - --wait=true
      - --timeout=120s
  register: _delete_vms_legacy
  changed_when: "'deleted' in (_delete_vms_legacy.stdout | default(''))"
  when: not _provider_state_stat.stat.exists or not _kubevirt_destroy_vm_state_complete
  tags: requires_cluster

- name: Delete Services by label selector
  ansible.builtin.command:
    argv:
      - oc
      - delete
      - svc
      - -l
      - "ard.teim.app/deployment={{ ard_deployment_name }}"
      - -n
      - "{{ _kubevirt_destroy_namespace }}"
      - --ignore-not-found
  register: _delete_svcs_legacy
  changed_when: "'deleted' in (_delete_svcs_legacy.stdout | default(''))"
  when: not _provider_state_stat.stat.exists or _kubevirt_destroy_service_names | length == 0
  tags: requires_cluster

- name: Delete orphaned DataVolumes by label selector
  ansible.builtin.command:
    argv:
      - oc
      - delete
      - dv
      - -l
      - "ard.teim.app/deployment={{ ard_deployment_name }}"
      - -n
      - "{{ _kubevirt_destroy_namespace }}"
      - --ignore-not-found
  register: _delete_dvs_legacy
  changed_when: "'deleted' in (_delete_dvs_legacy.stdout | default(''))"
  when: not _provider_state_stat.stat.exists or not _kubevirt_destroy_vm_state_complete
  tags: requires_cluster

- name: Delete namespace
  ansible.builtin.command:
    argv:
      - oc
      - delete
      - namespace
      - "{{ _kubevirt_destroy_namespace }}"
      - --ignore-not-found
  when: ard_kubevirt_delete_namespace | default(false) | bool
  register: _delete_ns
  changed_when: "'deleted' in _delete_ns.stdout"
  tags: requires_cluster
