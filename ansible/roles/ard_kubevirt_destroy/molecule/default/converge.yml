---
- name: Converge
  hosts: all
  gather_facts: true
  vars:
    ard_kubevirt_namespace: test-namespace
    ard_deployment_name: ard-test-devstack-1
    ard_deployment_dir: /tmp/ard-test-deployment
    ard_nodes:
      - name: controller
        hostname: controller
        flavor: devstack-control
        image: debian-13
        groups:
          - controller
          - switch
  roles:
    - role: ard_provider_common
  tasks:
    - name: Ensure test deployment directory exists
      ansible.builtin.file:
        path: "{{ ard_deployment_dir }}"
        state: directory
        mode: "0755"

    - name: Write persisted KubeVirt provider state fixture
      ansible.builtin.copy:
        dest: "{{ ard_deployment_dir }}/provider-state.yaml"
        mode: "0644"
        content: |
          ---
          ard_kubevirt_namespace: persisted-namespace
          controller_lb_service: persisted-controller-lb
          nodes:
            - name: controller
              vm_name: persisted-controller
            - name: compute-1
              vm_name: persisted-compute-1

    - name: Run KubeVirt destroy role against persisted state
      ansible.builtin.include_role:
        name: ard_kubevirt_destroy
