---
- name: Prepare MicroShift hosts
  hosts: "{{ microshift_target_hosts | default('microshift') }}"
  gather_facts: true
  vars_files:
    - "{{ lookup('ansible.builtin.first_found', {'files': [ard_local_vars_file | default(ard_deployment_dir | default('') ~ '/local-vars.yaml', true), '/dev/null'], 'skip': true}) }}"
  environment: "{{ ard_proxy_env | default({}) }}"
  vars:
    ard_proxy_env: >-
      {{
        {}
        | combine({'http_proxy': ard_http_proxy, 'HTTP_PROXY': ard_http_proxy} if (ard_http_proxy | default('', true) | length > 0) else {})
        | combine({'https_proxy': ard_https_proxy, 'HTTPS_PROXY': ard_https_proxy} if (ard_https_proxy | default('', true) | length > 0) else {})
        | combine({'no_proxy': ard_no_proxy, 'NO_PROXY': ard_no_proxy} if (ard_no_proxy | default('', true) | length > 0) else {})
      }}
  roles:
    - microshift_defaults
    - ensure_stack_user
    - microshift_prereqs
    - microshift_repos
    - microshift_install_rpm
    - microshift_install_multus
    - microshift_install_local_path
    - microshift_install_metallb
    - microshift_install_cert_manager
    - microshift_validate
    - role: prepare_operator_dev_tools
      when: oko_dev_tools_enabled | default(false) | bool
    - role: prepare_operator_sources
      when: oko_dev_repos | default([]) | length > 0

- name: Print MicroShift debug connection details
  hosts: all
  gather_facts: false
  vars_files:
    - "{{ lookup('ansible.builtin.first_found', {'files': [ard_local_vars_file | default(ard_deployment_dir | default('') ~ '/local-vars.yaml', true), '/dev/null'], 'skip': true}) }}"
  environment: "{{ ard_proxy_env | default({}) }}"
  vars:
    ard_proxy_env: >-
      {{
        {}
        | combine({'http_proxy': ard_http_proxy, 'HTTP_PROXY': ard_http_proxy} if (ard_http_proxy | default('', true) | length > 0) else {})
        | combine({'https_proxy': ard_https_proxy, 'HTTPS_PROXY': ard_https_proxy} if (ard_https_proxy | default('', true) | length > 0) else {})
        | combine({'no_proxy': ard_no_proxy, 'NO_PROXY': ard_no_proxy} if (ard_no_proxy | default('', true) | length > 0) else {})
      }}
  roles:
    - print_debug_ip
