---
- name: Discover ARD provider nodes
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - ard_provider_common
    - ard_provider_inventory

- name: Load ARD deployment DevStack variables
  hosts: all
  gather_facts: false
  roles:
    - ard_provider_common
    - ard_devstack_config

- name: Wait for provider node bootstrap to finish
  hosts: all
  gather_facts: false
  tasks:
    - name: Wait for cloud-init completion
      become: true
      ansible.builtin.shell: |
        if command -v cloud-init >/dev/null 2>&1; then
          cloud-init status --wait
        else
          echo 'cloud-init not installed; assuming bootstrap already consumed it'
        fi
      register: ard_cloud_init_status
      changed_when: false
      failed_when: >-
        ard_cloud_init_status.rc not in [0, 1, 2]
        or (
          'status: done' not in ard_cloud_init_status.stdout
          and 'status: error' not in ard_cloud_init_status.stdout
          and 'cloud-init not installed' not in ard_cloud_init_status.stdout
        )

    - name: Warn if cloud-init finished with errors
      ansible.builtin.debug:
        msg: >-
          cloud-init completed with errors.
          Check cloud-init logs on {{ inventory_hostname }}.
      when: "'status: error' in (ard_cloud_init_status.stdout | default(''))"

- name: Deploy ARD multinode DevStack
  import_playbook: ../workloads/devstack/deploy-multinode.yaml
