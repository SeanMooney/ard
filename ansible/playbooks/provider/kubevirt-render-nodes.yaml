---
# Lightweight node renderer for KubeVirt provider.
# Generates nodes.yaml from topology presets without CIDR/MAC allocation.
- name: Render KubeVirt nodes from topology
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - ard_provider_common
  tasks:
    - name: Load topology presets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../roles/ard_provider_common/files/presets/topologies.yaml"

    - name: Load node type presets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../roles/ard_provider_common/files/presets/node-types.yaml"

    - name: Resolve topology
      ansible.builtin.set_fact:
        _topology: "{{ ard_render_topologies[ard_topology] }}"

    - name: Build node list from topology pools
      ansible.builtin.include_tasks: kubevirt-render-pool.yaml
      loop: "{{ _topology.node_pools }}"
      loop_control:
        loop_var: pool
        label: "{{ pool.type }}"

    - name: Write nodes.yaml
      ansible.builtin.copy:
        dest: "{{ ard_deployment_dir }}/nodes.yaml"
        mode: "0644"
        content: "{{ {'ard_nodes': _nodes} | to_nice_yaml(indent=2, sort_keys=False) }}"
