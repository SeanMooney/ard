---
- name: Apply ARD provider deployment
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - ard_provider_common
    - ard_provider_preflight
    - ard_provider_image
    - ard_provider_network
    - ard_provider_node
    - ard_provider_inventory

- name: Wait for ARD provider nodes to be ready
  hosts: ard_provider_nodes
  gather_facts: false
  roles:
    - ard_provider_common
  tasks:
    - name: Wait for SSH and Ansible connectivity
      ansible.builtin.wait_for_connection:
        timeout: "{{ ard_apply_wait_timeout }}"
        sleep: 5

    - name: Wait for cloud-init completion
      become: true
      ansible.builtin.shell: |
        if command -v cloud-init >/dev/null 2>&1; then
          cloud-init status --wait
        else
          echo 'cloud-init not installed; assuming bootstrap already consumed it'
        fi
      register: ard_cloud_init_status
      changed_when: false
      failed_when: >-
        ard_cloud_init_status.rc not in [0, 1, 2]
        or (
          'status: done' not in ard_cloud_init_status.stdout
          and 'status: error' not in ard_cloud_init_status.stdout
          and 'cloud-init not installed' not in ard_cloud_init_status.stdout
        )

    - name: Warn if cloud-init finished with errors
      ansible.builtin.debug:
        msg: >-
          cloud-init completed with errors.
          Check cloud-init logs on {{ inventory_hostname }}.
      when: "'status: error' in (ard_cloud_init_status.stdout | default(''))"

- name: Install base packages on ARD provider nodes
  hosts: ard_provider_nodes
  gather_facts: true
  roles:
    - ard_base_packages

- name: Finalize discovered static provider addresses
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Load ARD deployment variables
      ansible.builtin.include_vars:
        file: "{{ ard_deployment_dir }}/deployment.yaml"

    - name: Persist discovered static node addresses
      ansible.builtin.copy:
        dest: "{{ ard_deployment_dir }}/provider-state.yaml"
        mode: "0644"
        content: |
          ---
          ard_provider: static
          ard_deployment_name: {{ ard_deployment_name }}
          ard_static_source: discovered
          ard_static_nodes:
          {% for node_name in groups['ard_provider_nodes'] %}
            - name: {{ node_name }}
              ansible_host: {{ hostvars[node_name].ansible_host }}
              ansible_user: {{ hostvars[node_name].ansible_user | default('stack') }}
              private_ipv4: {{ hostvars[node_name].ansible_facts.default_ipv4.address }}
              public_ipv4: {{ hostvars[node_name].ansible_facts.default_ipv4.address }}
              public_ipv6: {{ hostvars[node_name].ansible_facts.get('default_ipv6', {}).get('address', '') | to_json }}
          {% endfor %}
      when: ard_provider == 'static'

    - name: Regenerate static inventory with discovered addresses
      ansible.builtin.include_role:
        name: ard_static_inventory
      when: ard_provider == 'static'

- name: Configure datacenter interface on ARD provider nodes
  hosts: ard_provider_nodes
  gather_facts: false
  roles:
    - ard_configure_datacenter_iface
