---
# Configure datacenter interface and multinode bridge on all nodes.
# Reusable from molecule, make, or direct ansible-playbook invocation.
#
# Usage:
#   ansible-playbook -i deployment/inventory.yaml \
#     ansible/playbooks/provider/configure-bridge.yaml
#
- name: Configure datacenter interface and multinode bridge
  hosts: all
  gather_facts: true
  become: true
  roles:
    - ard_configure_datacenter_iface
    - ard_multinode_bridge
